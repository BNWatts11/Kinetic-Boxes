<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Kinetic Boxes: Diogo Style</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        .status { color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.5); padding: 5px 10px; margin-bottom: 5px; border-radius: 4px; font-size: 12px; max-width: 300px; letter-spacing: 1px;}
        
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 20px; background: rgba(0,0,0,0.8); color: white; 
            border: 2px solid white; border-radius: 4px; cursor: pointer; z-index: 100;
            text-transform: uppercase; letter-spacing: 4px; transition: all 0.3s;
        }
        #start-btn:hover { background: white; color: black; box-shadow: 0 0 30px rgba(255,255,255,0.5); }

        #webcam {
            position: absolute; bottom: 10px; left: 10px; width: 120px; height: 90px;
            z-index: 2; border: 1px solid #333; border-radius: 4px; transform: scaleX(-1); opacity: 0.3;
        }

        #reset-msg {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            font-size: 16px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 3px;
            opacity: 0; transition: opacity 1s; pointer-events: none; z-index: 5;
            background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px;
        }
    </style>
</head>
<body>
    <button id="start-btn">Iniciar Instalação</button>
    <video id="webcam" autoplay playsinline></video>
    
    <video id="bg-music" loop playsinline style="display: none;">
        <source src="background.mov" type="video/quicktime">
        <source src="background.mp3" type="audio/mp3">
    </video>
    
    <div id="ui-layer">
        <div id="status-main" class="status">A aguardar início...</div>
        <div id="status-p1" class="status">P1: Ausente</div>
        <div id="status-p2" class="status">P2: Ausente</div>
        <div id="status-debug" class="status" style="font-family: monospace; font-size: 11px; white-space: pre; line-height: 1.35;"></div>
    </div>

    <div id="reset-msg">⟳ A Reiniciar Ciclo ⟳</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DecalGeometry } from 'three/addons/geometries/DecalGeometry.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { PoseLandmarker, HandLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

        const statusMain = document.getElementById("status-main");
        const statusDebug = document.getElementById("status-debug");
        const resetMsg = document.getElementById("reset-msg");
        const startBtn = document.getElementById("start-btn");
        const bgMusic = document.getElementById("bg-music");
        const MAX_PIXEL_RATIO = 1.5;
        const DETECTION_INTERVAL_MS = 1000 / 24;
        const BLOOM_CONFIG = { threshold: 0.22, strength: 1.05, radius: 0.58 };
        const BLOOM_PULSE_STRENGTH = 0.9;
        const CHALK_DUST_TEXTURE_URL = 'dust-png-1.png?v=1';
        const MAX_DECALS = 36;
        const DECAL_IMPACT_THRESHOLD = 1.4;

        // Pose landmarks are in normalized image space (x,y in ~[0,1], z a relative depth hint).
        // Two mappings share the same formulas but different gains:
        // - Silhouette: smaller scales so the debug stick figure does not dominate the stage.
        // - Hands: larger scales so wrist motion sweeps a wider stage volume (farther boxes).
        const STAGE_MAP_SILHOUETTE = { scaleX: 9, scaleY: 6, zMult: 11, zClamp: 2.4 };
        const STAGE_MAP_HAND = { scaleX: 24, scaleY: 15, zMult: 26, zClamp: 4.2 };

        // Grab/throw configuration. The closure metric runs on HandLandmarker output
        // (21 keypoints/hand). It is the average 2D distance from the four finger tips
        // (index 8, middle 12, ring 16, pinky 20) to the wrist (0), divided by the
        // wrist-to-middle-MCP segment (0->9). That denominator is a stable in-frame
        // ruler proportional to hand size, making the ratio scale-invariant.
        //   Open hand   ~ 2.5 - 3.5
        //   Half-curl   ~ 1.8 - 2.2
        //   Tight fist  ~ 1.0 - 1.4
        // FINGER_SENSITIVITY > 1 raises the thresholds, so a smaller curl already
        // counts as a grab. Hysteresis (GRAB < RELEASE) prevents flicker.
        // Realistic HandLandmarker closure ranges (from observation):
        //   tight fist  ~ 0.9 - 1.25
        //   half-curl   ~ 1.3 - 1.6
        //   open hand   ~ 1.7 - 2.1
        //   stretched   ~ 2.1 - 2.3 (rare)
        // Hysteresis band must sit fully within achievable values, otherwise
        // either grab or release becomes impossible. Old release=2.4 was the
        // smoking gun for "boxes never release".
        const FINGER_SENSITIVITY = 1.0;
        // Slightly lower fist threshold = easier to enter grab; release stays clearly higher.
        const GRAB_FIST_THRESHOLD = 1.22;
        const GRAB_RELEASE_THRESHOLD = 1.82;
        const HAND_MATCH_DISTANCE = 0.92;
        const POSE_WRIST_MIN_VISIBILITY = 0.05;
        const GRAB_REACH = 4.35;
        const THROW_VELOCITY_MULT = 1.25;
        const THROW_VELOCITY_CAP = 22;
        const VELOCITY_SAMPLES = 5;
        const HAND_COLLISION_GROUP = 2;
        const GRAB_CONSTRAINT_FORCE = 105;
        const HAND_DETECT_CONFIDENCE = 0.1;
        // If HandLandmarker momentarily loses a hand we are currently grabbing
        // with, wait this long (ms) before force-releasing, so a one-frame miss
        // does not drop the box. Anything longer than this and the grip is
        // considered abandoned and the box is freed defensively.
        const GRAB_HAND_LOST_GRACE_MS = 500;

        // --- STEP 3: VISUAL VARIETY CONFIG ---
        // BoxGeometry assigns one of six material slots to each face:
        //   0 = +x (right)   1 = -x (left)
        //   2 = +y (top)     3 = -y (bottom)
        //   4 = +z (front, towards camera)
        //   5 = -z (back)
        // Each FACE_VARIANT lists which slot indices receive the chalk drawing.
        // The remaining slots fall back to a neutral cardboard tone, so a "1f"
        // box reads as a single drawn surface on an otherwise blank cube.
        const FACE_VARIANTS = [
            { name: '1f', textured: [4] },                 // 1 face: front
            { name: '2f', textured: [2, 4] },              // 2 faces: top + front
            { name: '3f', textured: [0, 2, 4] },           // 3 faces: right + top + front
            { name: '6f', textured: [0, 1, 2, 3, 4, 5] }   // all 6
        ];
        // Frequency of each variant; sums to 1. Most boxes get 1 or 2 textured
        // faces; a few are fully painted (rare hero boxes that anchor the eye).
        const FACE_VARIANT_WEIGHTS = [0.30, 0.30, 0.25, 0.15];

        // Initial pose variety. Stacked boxes stay upright to preserve the pile
        // built by the aggregation generators; only ground boxes can tilt or lie.
        const TILT_PROBABILITY = 0.35;
        const LYING_PROBABILITY = 0.18;
        const TILT_MAX_RAD = 0.18; // ~10 degrees on each chosen axis

        // --- STEP 4: SENSORY FEEDBACK (symbol-tagged boxes + impact audio) ---
        // Each box gets a categorical soundSymbol picked at generation time.
        // Weights need not sum to 1.0 — pickSoundSymbol() divides by their total.
        // "neutral" keeps the chalk-only look — no badge, no extra stinger.
        const SOUND_SYMBOL_WEIGHTS = {
            water: 0.12,
            nature: 0.12,
            fire: 0.10,
            light: 0.10,
            neutral: 0.56
        };
        // Impact velocity (|impactAlongNormal| from Cannon) is roughly 0–15 for
        // energetic hits. We map linearly: gain = clamp(impact * GAIN_PER_IMPACT, 0, MAX).
        // That makes perceived loudness strictly proportional to hit strength until the cap.
        const IMPACT_AUDIO_MIN = 0.16;          // low floor so slides / pushes still whisper
        const IMPACT_LINEAR_REF = 9.5;        // impact at which scream layer reaches full normalised 1.0
        const IMPACT_GAIN_PER_UNIT = 0.11;    // linear slope: gain = impact * this (before cap)
        const IMPACT_GAIN_CAP = 0.95;         // hard ceiling so the WebAudio graph never clips nastily
        const SYMBOL_STINGER_GAIN_SCALE = 0.145; // themed layer (ducked scream when symbols hit)

        // --- 0. AUDIO (Sintetizador + Video MOV) ---
        let audioCtx;

        /** Browsers start AudioContext suspended until a user gesture; resume once. */
        function ensureAudioContextRunning() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
        }

        startBtn.addEventListener('click', () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                ensureAudioContextRunning();

                // Tenta tocar o ficheiro MOV
                bgMusic.play().then(() => {
                    console.log("Audio de fundo iniciado");
                }).catch(e => {
                    console.log("Erro ao tocar MOV, a tentar sintetizador de emergência.");
                });

                startBtn.style.opacity = '0'; 
                setTimeout(() => startBtn.style.display = 'none', 500);
                startAI(); 
            } catch (e) {
                alert("Erro ao iniciar Audio: " + e.message);
            }
        });

        // --- Step 4 WebAudio helpers (procedural: no external .wav required) ---
        function pickSoundSymbol() {
            const w = SOUND_SYMBOL_WEIGHTS;
            const order = ['water', 'nature', 'fire', 'light', 'neutral'];
            let sum = 0;
            for (const k of order) sum += w[k] || 0;
            let r = Math.random() * sum;
            for (const k of order) {
                r -= w[k] || 0;
                if (r <= 0) return k;
            }
            return 'neutral';
        }

        /** Maps physics impact to a 0..1 linear factor (strictly proportional to impact until REF). */
        function impactToLinearGainFactor(impact) {
            if (impact < IMPACT_AUDIO_MIN) return 0;
            return Math.min(impact / IMPACT_LINEAR_REF, 1);
        }

        /**
         * getImpactVelocityAlongNormal() is often tiny during sustained pushes
         * (e.g. kinematic hand sliding on a box). Blend in closing speed from the
         * two bodies' world linear velocities so shoves still trigger audio, not only taps.
         */
        function effectiveImpactFromContact(contact) {
            let imp = Math.abs(contact.getImpactVelocityAlongNormal());
            const bi = contact.bi;
            const bj = contact.bj;
            if (!bi || !bj) return Math.min(24, imp);
            const rel = new CANNON.Vec3();
            bi.velocity.vsub(bj.velocity, rel);
            const closing = Math.abs(rel.dot(contact.ni));
            return Math.min(24, Math.max(imp, closing * 0.42));
        }

        /**
         * Generic impact layer: band-limited noise (body hit). gainMul lets us duck
         * this layer when a themed symbol stinger plays so water/fire/etc. read clearly.
         */
        function playImpactScreamLinear(impact, opts = {}) {
            if (!audioCtx) return;
            ensureAudioContextRunning();
            const factor = impactToLinearGainFactor(impact);
            if (factor <= 0) return;

            const gainMul = opts.gainMul ?? 1;
            const peakGain = Math.min(impact * IMPACT_GAIN_PER_UNIT * gainMul, IMPACT_GAIN_CAP);
            const t0 = audioCtx.currentTime;
            const dur = 0.2 + factor * 0.09;

            const frames = Math.max(256, Math.floor(audioCtx.sampleRate * dur));
            const buffer = audioCtx.createBuffer(1, frames, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < frames; i++) {
                const fade = 1 - i / frames;
                data[i] = (Math.random() * 2 - 1) * fade * fade;
            }
            const src = audioCtx.createBufferSource();
            src.buffer = buffer;

            const bp = audioCtx.createBiquadFilter();
            bp.type = 'bandpass';
            bp.frequency.setValueAtTime(720 + factor * 1100, t0);
            bp.Q.setValueAtTime(1.15 + factor * 0.5, t0);

            const g = audioCtx.createGain();
            src.connect(bp);
            bp.connect(g);
            g.connect(audioCtx.destination);

            g.gain.setValueAtTime(0, t0);
            g.gain.linearRampToValueAtTime(peakGain, t0 + 0.01);
            g.gain.linearRampToValueAtTime(0.0001, t0 + dur);

            src.start(t0);
            src.stop(t0 + dur + 0.02);
        }

        /** Water: resonant drips + filtered wash (liquid / bubble read). */
        function playWaterSymbolStinger(impact) {
            if (!audioCtx) return;
            ensureAudioContextRunning();
            const factor = impactToLinearGainFactor(impact);
            if (factor <= 0) return;
            const peak = factor * SYMBOL_STINGER_GAIN_SCALE * 1.35;
            const t0 = audioCtx.currentTime;

            const durWash = 0.19;
            const frW = Math.floor(audioCtx.sampleRate * durWash);
            const bufW = audioCtx.createBuffer(1, frW, audioCtx.sampleRate);
            const dW = bufW.getChannelData(0);
            for (let i = 0; i < frW; i++) {
                const e = Math.sin((i / frW) * Math.PI);
                dW[i] = (Math.random() * 2 - 1) * e * 0.55;
            }
            const srcW = audioCtx.createBufferSource();
            srcW.buffer = bufW;
            const lpW = audioCtx.createBiquadFilter();
            lpW.type = 'lowpass';
            lpW.frequency.setValueAtTime(1200, t0);
            const pk = audioCtx.createBiquadFilter();
            pk.type = 'peaking';
            pk.frequency.setValueAtTime(480, t0);
            pk.Q.setValueAtTime(0.85, t0);
            pk.gain.setValueAtTime(9, t0);
            const gW = audioCtx.createGain();
            srcW.connect(lpW);
            lpW.connect(pk);
            pk.connect(gW);
            gW.connect(audioCtx.destination);
            gW.gain.setValueAtTime(0, t0);
            gW.gain.linearRampToValueAtTime(peak * 0.38, t0 + 0.02);
            gW.gain.linearRampToValueAtTime(0.0001, t0 + durWash);
            srcW.start(t0);
            srcW.stop(t0 + durWash + 0.02);

            const drops = [[0, 320, 200], [0.052, 395, 215], [0.098, 275, 165]];
            for (const [delay, f0, f1] of drops) {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                const t = t0 + delay;
                osc.frequency.setValueAtTime(f0, t);
                osc.frequency.exponentialRampToValueAtTime(Math.max(f1, 45), t + 0.095);
                const gg = audioCtx.createGain();
                osc.connect(gg);
                gg.connect(audioCtx.destination);
                gg.gain.setValueAtTime(0, t);
                gg.gain.linearRampToValueAtTime(peak * 0.52, t + 0.004);
                gg.gain.linearRampToValueAtTime(0.0001, t + 0.11);
                osc.start(t);
                osc.stop(t + 0.12);
            }
        }

        /** Nature: filtered wind bed + short high chirps (birds in foliage). */
        function playNatureSymbolStinger(impact) {
            if (!audioCtx) return;
            ensureAudioContextRunning();
            const factor = impactToLinearGainFactor(impact);
            if (factor <= 0) return;
            const peak = factor * SYMBOL_STINGER_GAIN_SCALE * 1.28;
            const t0 = audioCtx.currentTime;

            const dur = 0.3;
            const fr = Math.floor(audioCtx.sampleRate * dur);
            const buf = audioCtx.createBuffer(1, fr, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            let last = 0;
            for (let i = 0; i < fr; i++) {
                const white = Math.random() * 2 - 1;
                last = last * 0.91 + white * 0.09;
                const e = Math.pow(1 - i / fr, 0.38);
                data[i] = last * e;
            }
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            const bp = audioCtx.createBiquadFilter();
            bp.type = 'bandpass';
            bp.frequency.setValueAtTime(380, t0);
            bp.Q.setValueAtTime(0.42, t0);
            const g = audioCtx.createGain();
            src.connect(bp);
            bp.connect(g);
            g.connect(audioCtx.destination);
            g.gain.setValueAtTime(0, t0);
            g.gain.linearRampToValueAtTime(peak * 0.52, t0 + 0.06);
            g.gain.linearRampToValueAtTime(0.0001, t0 + dur);
            src.start(t0);
            src.stop(t0 + dur + 0.02);

            const chirps = [[0.075, 2180, 1580], [0.145, 2550, 1880], [0.218, 2320, 1720]];
            for (const [delay, f0, f1] of chirps) {
                const o = audioCtx.createOscillator();
                o.type = 'sine';
                const t = t0 + delay;
                o.frequency.setValueAtTime(f0, t);
                o.frequency.exponentialRampToValueAtTime(Math.max(f1, 90), t + 0.03);
                const gg = audioCtx.createGain();
                o.connect(gg);
                gg.connect(audioCtx.destination);
                gg.gain.setValueAtTime(0, t);
                gg.gain.linearRampToValueAtTime(peak * 0.36, t + 0.002);
                gg.gain.linearRampToValueAtTime(0.0001, t + 0.058);
                o.start(t);
                o.stop(t + 0.065);
            }
        }

        /** Fire: low saw combustion + fast upward crackle (heat + embers). */
        function playFireSymbolStinger(impact) {
            if (!audioCtx) return;
            ensureAudioContextRunning();
            const factor = impactToLinearGainFactor(impact);
            if (factor <= 0) return;
            const peak = factor * SYMBOL_STINGER_GAIN_SCALE * 1.38;
            const t0 = audioCtx.currentTime;

            const body = audioCtx.createOscillator();
            body.type = 'sawtooth';
            body.frequency.setValueAtTime(62 + factor * 20, t0);
            body.frequency.linearRampToValueAtTime(40, t0 + 0.17);
            const flp = audioCtx.createBiquadFilter();
            flp.type = 'lowpass';
            flp.frequency.setValueAtTime(480, t0);
            const bg = audioCtx.createGain();
            body.connect(flp);
            flp.connect(bg);
            bg.connect(audioCtx.destination);
            bg.gain.setValueAtTime(0, t0);
            bg.gain.linearRampToValueAtTime(peak * 0.4, t0 + 0.018);
            bg.gain.linearRampToValueAtTime(0.0001, t0 + 0.18);
            body.start(t0);
            body.stop(t0 + 0.19);

            const dur = 0.12;
            const frames = Math.floor(audioCtx.sampleRate * dur);
            const buffer = audioCtx.createBuffer(1, frames, audioCtx.sampleRate);
            const d = buffer.getChannelData(0);
            for (let i = 0; i < frames; i++) {
                const e = Math.pow(1 - i / frames, 2.1);
                d[i] = (Math.random() * 2 - 1) * e;
            }
            const src = audioCtx.createBufferSource();
            src.buffer = buffer;
            const bp = audioCtx.createBiquadFilter();
            bp.type = 'bandpass';
            bp.frequency.setValueAtTime(850, t0);
            bp.frequency.linearRampToValueAtTime(3600, t0 + dur);
            bp.Q.setValueAtTime(2.1, t0);
            const g = audioCtx.createGain();
            src.connect(bp);
            bp.connect(g);
            g.connect(audioCtx.destination);
            g.gain.setValueAtTime(0, t0);
            g.gain.linearRampToValueAtTime(peak * 0.62, t0 + 0.003);
            g.gain.linearRampToValueAtTime(0.0001, t0 + dur);
            src.start(t0);
            src.stop(t0 + dur + 0.02);
        }

        /** Light: inharmonic chime (sparkle) + low filtered thunder roll. */
        function playLightSymbolStinger(impact) {
            if (!audioCtx) return;
            ensureAudioContextRunning();
            const factor = impactToLinearGainFactor(impact);
            if (factor <= 0) return;
            const peak = factor * SYMBOL_STINGER_GAIN_SCALE * 1.32;
            const t0 = audioCtx.currentTime;

            const ratios = [1, 1.21, 1.47, 1.89];
            const base = 900 + factor * 240;
            const bus = audioCtx.createGain();
            bus.connect(audioCtx.destination);
            bus.gain.setValueAtTime(1, t0);
            for (let i = 0; i < ratios.length; i++) {
                const o = audioCtx.createOscillator();
                o.type = 'triangle';
                const f = base * ratios[i];
                o.frequency.setValueAtTime(f, t0);
                o.frequency.linearRampToValueAtTime(f * 0.93, t0 + 0.06);
                const gg = audioCtx.createGain();
                o.connect(gg);
                gg.connect(bus);
                const part = peak * (0.2 + 0.07 * (1 - i / ratios.length));
                gg.gain.setValueAtTime(0, t0);
                gg.gain.linearRampToValueAtTime(part, t0 + 0.003 + i * 0.004);
                gg.gain.linearRampToValueAtTime(0.0001, t0 + 0.38);
                o.start(t0);
                o.stop(t0 + 0.39);
            }

            const dur = 0.22;
            const fr = Math.floor(audioCtx.sampleRate * dur);
            const buf = audioCtx.createBuffer(1, fr, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < fr; i++) {
                const e = (1 - i / fr) * (1 - i / fr);
                d[i] = (Math.random() * 2 - 1) * e;
            }
            const ns = audioCtx.createBufferSource();
            ns.buffer = buf;
            const lp = audioCtx.createBiquadFilter();
            lp.type = 'lowpass';
            lp.frequency.setValueAtTime(105, t0 + 0.05);
            lp.frequency.linearRampToValueAtTime(48, t0 + dur);
            const rg = audioCtx.createGain();
            ns.connect(lp);
            lp.connect(rg);
            rg.connect(audioCtx.destination);
            rg.gain.setValueAtTime(0, t0 + 0.038);
            rg.gain.linearRampToValueAtTime(peak * 0.72, t0 + 0.075);
            rg.gain.linearRampToValueAtTime(0.0001, t0 + dur);
            ns.start(t0);
            ns.stop(t0 + dur + 0.02);
        }

        function playSymbolStingerForBody(body, impact) {
            const sym = body.userData?.soundSymbol;
            if (sym === 'water') playWaterSymbolStinger(impact);
            else if (sym === 'nature') playNatureSymbolStinger(impact);
            else if (sym === 'fire') playFireSymbolStinger(impact);
            else if (sym === 'light') playLightSymbolStinger(impact);
        }

        /**
         * One physical hit → scream (ducked if a themed box is involved) + symbol stingers.
         */
        function playFullCollisionAudio(bodyA, bodyB, impact) {
            const symA = bodyA?.userData?.soundSymbol;
            const symB = bodyB?.userData?.soundSymbol;
            const themed = (symA && symA !== 'neutral') || (symB && symB !== 'neutral');
            playImpactScreamLinear(impact, { gainMul: themed ? 0.5 : 1 });
            playSymbolStingerForBody(bodyA, impact);
            if (bodyB && bodyB.mass > 0) playSymbolStingerForBody(bodyB, impact * 0.92);
        }

        /** Kept for any legacy call sites — forwards to the new linear scream. */
        function playSound(velocity) {
            playImpactScreamLinear(velocity);
        }

        // --- 1. CENA 3D & RASTO ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505); // Fundo quase preto
        scene.fog = new THREE.Fog(0x050505, 12, 30);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 120);
        camera.position.set(0, 4.6, 11.8);
        camera.lookAt(0, 1.1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, MAX_PIXEL_RATIO));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.autoClearColor = false; 
        document.body.appendChild(renderer.domElement);

        // Plano de Fade (Rasto)
        const fadeMaterial = new THREE.MeshBasicMaterial({
            color: 0x050505, 
            transparent: true,
            opacity: 0.15,
            depthTest: false
        });
        const fadePlane = new THREE.Mesh(new THREE.PlaneGeometry(28, 28), fadeMaterial);
        fadePlane.position.z = -0.1; 
        fadePlane.renderOrder = -1; 
        camera.add(fadePlane);
        scene.add(camera);

        // Luzes
        scene.add(new THREE.HemisphereLight(0xdde7ff, 0x080808, 0.7));

        const keyLight = new THREE.DirectionalLight(0xfff6e0, 1.8);
        keyLight.position.set(6, 11, 8);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(2048, 2048);
        keyLight.shadow.camera.near = 0.5;
        keyLight.shadow.camera.far = 45;
        keyLight.shadow.camera.left = -14;
        keyLight.shadow.camera.right = 14;
        keyLight.shadow.camera.top = 14;
        keyLight.shadow.camera.bottom = -14;
        scene.add(keyLight);

        const rimLight = new THREE.SpotLight(0x7fb3ff, 20, 38, Math.PI / 7, 0.35, 1.2);
        rimLight.position.set(-5, 6, -3);
        rimLight.target.position.set(0, 2, 0);
        scene.add(rimLight);
        scene.add(rimLight.target);

        const fillLight = new THREE.PointLight(0xff7a3d, 8, 24, 2);
        fillLight.position.set(0, 3, 5);
        scene.add(fillLight);

        const backgroundLight = new THREE.PointLight(0x4fd8ff, 2.5, 32, 2);
        backgroundLight.position.set(0, 5, -7);
        scene.add(backgroundLight);

        // Post-processing is handled in a separate composer so the scene can keep a dark stage
        // base while selectively amplifying bright highlights. This gives the installation a
        // theatrical "fluorescent" response without forcing every material to be emissive.
        const composer = new EffectComposer(renderer);
        composer.setPixelRatio(Math.min(window.devicePixelRatio, MAX_PIXEL_RATIO));
        composer.setSize(window.innerWidth, window.innerHeight);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            BLOOM_CONFIG.strength,
            BLOOM_CONFIG.radius,
            BLOOM_CONFIG.threshold
        );
        composer.addPass(bloomPass);

        // --- 2. FÍSICA ---
        // The physics world is tuned for stacks and repeated impacts rather than speed alone.
        // SAPBroadphase is more stable than the naive broadphase for many resting bodies because
        // it reduces unnecessary broadphase pair tests once objects align along the main axes.
        // Higher solver iterations and softer contact relaxation make the pile settle instead of
        // vibrating, which is essential in an installation where "rest" should read as intentional.
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.allowSleep = true;
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.solver.iterations = 15;
        world.solver.tolerance = 0.001;
        
        const matDefault = new CANNON.Material('default');
        const matPlayer = new CANNON.Material('player');
        world.addContactMaterial(new CANNON.ContactMaterial(matDefault, matPlayer, {
            friction: 0.25,
            restitution: 0.08,
            contactEquationStiffness: 5e7,
            contactEquationRelaxation: 4,
            frictionEquationStiffness: 1e7,
            frictionEquationRelaxation: 4
        }));
        world.defaultContactMaterial.friction = 0.45;
        world.defaultContactMaterial.restitution = 0.05;
        world.defaultContactMaterial.contactEquationStiffness = 5e7;
        world.defaultContactMaterial.contactEquationRelaxation = 4;
        world.defaultContactMaterial.frictionEquationStiffness = 1e7;
        world.defaultContactMaterial.frictionEquationRelaxation = 4;

        // Physics and rendering stay separated on purpose:
        // bodies = simulation truth, initialPos / initialQuats = reset targets,
        // instanceScales = visual scaling data for InstancedMesh. This split keeps
        // Cannon authoritative while allowing a very cheap render path on the GPU.
        const bodies = [], initialPos = [], initialQuats = [], instanceScales = [];
        const gltfLoader = new GLTFLoader();
        const boxSize = 1;
        let modelBaseSize = null;
        let sharedBoxTexture = null;
        let boxGeometry = null;            // unit BoxGeometry (1x1x1) with 6 face groups
        let boxMaterial = null;            // alias kept for the decal proxy mesh
        let texturedFaceMaterial = null;   // chalk drawing material (artist texture)
        let neutralFaceMaterial = null;    // blank cardboard material
        let variantMaterialsArrays = null; // FACE_VARIANTS.length 6-element arrays
        let boxInstancedMeshes = null;     // one InstancedMesh per face variant
        // Reused per-frame dirty bitmap so the render loop never allocates.
        const boxInstancedMeshesDirtyScratch = new Array(FACE_VARIANTS.length).fill(false);
        let collisionPulse = 0;
        let spotlightImpact = 0;
        let decalTexture = null;
        let decalMaterial = null;
        const collisionFocus = new THREE.Vector3(0, 1.5, 0);
        const instanceDummy = new THREE.Object3D();
        const decalPool = [];
        const decalProxyMesh = new THREE.Mesh();
        // Step 4: small badge planes (shared geometry + four symbol materials) sit slightly
        // outside each tagged box's local +Z face; they are *not* instanced with the pile.
        const symbolBadgeOffsetLocal = new THREE.Vector3();
        const symbolBadgeWorldOffset = new THREE.Vector3();
        let symbolBadgeGeometry = null;
        let symbolWaterMaterial = null;
        let symbolNatureMaterial = null;
        let symbolFireMaterial = null;
        let symbolLightMaterial = null;

        function canvasTextureFromCanvas(canvas) {
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.needsUpdate = true;
            return tex;
        }

        function makeWaterSymbolCanvas() {
            const c = document.createElement('canvas');
            c.width = c.height = 128;
            const ctx = c.getContext('2d');
            const grd = ctx.createLinearGradient(0, 0, 128, 128);
            grd.addColorStop(0, '#1f9ae6');
            grd.addColorStop(1, '#063056');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = 'rgba(255,255,255,0.92)';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(10, 76);
            ctx.bezierCurveTo(38, 38, 54, 108, 66, 72);
            ctx.bezierCurveTo(78, 40, 96, 100, 118, 58);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(210, 245, 255, 0.55)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(90, 36, 9, 0.3, Math.PI * 1.7);
            ctx.stroke();
            return c;
        }

        function makeNatureSymbolCanvas() {
            const c = document.createElement('canvas');
            c.width = c.height = 128;
            const ctx = c.getContext('2d');
            const grd = ctx.createLinearGradient(0, 128, 128, 0);
            grd.addColorStop(0, '#174a24');
            grd.addColorStop(1, '#45c96a');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = 'rgba(255,255,255,0.92)';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(64, 104);
            ctx.quadraticCurveTo(32, 70, 40, 36);
            ctx.quadraticCurveTo(64, 18, 88, 36);
            ctx.quadraticCurveTo(96, 70, 64, 104);
            ctx.closePath();
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255,255,255,0.45)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(64, 78);
            ctx.quadraticCurveTo(50, 52, 42, 38);
            ctx.stroke();
            return c;
        }

        function makeFireSymbolCanvas() {
            const c = document.createElement('canvas');
            c.width = c.height = 128;
            const ctx = c.getContext('2d');
            const grd = ctx.createRadialGradient(52, 88, 8, 64, 72, 70);
            grd.addColorStop(0, '#fff4a8');
            grd.addColorStop(0.25, '#ff9a2e');
            grd.addColorStop(0.55, '#e84b17');
            grd.addColorStop(1, '#3a0a06');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(44, 96);
            ctx.quadraticCurveTo(38, 52, 58, 36);
            ctx.quadraticCurveTo(78, 22, 88, 44);
            ctx.quadraticCurveTo(98, 68, 72, 96);
            ctx.quadraticCurveTo(56, 108, 44, 96);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255,220,160,0.55)';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(52, 100);
            ctx.quadraticCurveTo(64, 48, 82, 40);
            ctx.stroke();
            return c;
        }

        function makeLightSymbolCanvas() {
            const c = document.createElement('canvas');
            c.width = c.height = 128;
            const ctx = c.getContext('2d');
            const grd = ctx.createRadialGradient(64, 64, 4, 64, 64, 72);
            grd.addColorStop(0, '#ffffff');
            grd.addColorStop(0.12, '#fff8c4');
            grd.addColorStop(0.35, '#ffd54a');
            grd.addColorStop(0.7, '#6a4fb8');
            grd.addColorStop(1, '#1a1033');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = 'rgba(255,255,255,0.85)';
            ctx.lineWidth = 3;
            for (let i = 0; i < 10; i++) {
                const ang = (i / 10) * Math.PI * 2 + 0.2;
                ctx.beginPath();
                ctx.moveTo(64, 64);
                ctx.lineTo(64 + Math.cos(ang) * 52, 64 + Math.sin(ang) * 52);
                ctx.stroke();
            }
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            ctx.beginPath();
            ctx.arc(64, 64, 10, 0, Math.PI * 2);
            ctx.fill();

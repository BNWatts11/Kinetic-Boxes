<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Kinetic Boxes: Diogo Style</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        .status { color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.5); padding: 5px 10px; margin-bottom: 5px; border-radius: 4px; font-size: 12px; max-width: 300px; letter-spacing: 1px;}
        
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 20px; background: rgba(0,0,0,0.8); color: white; 
            border: 2px solid white; border-radius: 4px; cursor: pointer; z-index: 100;
            text-transform: uppercase; letter-spacing: 4px; transition: all 0.3s;
        }
        #start-btn:hover { background: white; color: black; box-shadow: 0 0 30px rgba(255,255,255,0.5); }

        #webcam {
            position: absolute; bottom: 10px; left: 10px; width: 120px; height: 90px;
            z-index: 2; border: 1px solid #333; border-radius: 4px; transform: scaleX(-1); opacity: 0.3;
        }

        #reset-msg {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            font-size: 16px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 3px;
            opacity: 0; transition: opacity 1s; pointer-events: none; z-index: 5;
            background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px;
        }
    </style>
</head>
<body>
    <button id="start-btn">Iniciar Instalação</button>
    <video id="webcam" autoplay playsinline></video>
    
    <video id="bg-music" loop playsinline style="display: none;">
        <source src="background.mov" type="video/quicktime">
        <source src="background.mp3" type="audio/mp3">
    </video>
    
    <div id="ui-layer">
        <div id="status-main" class="status">A aguardar início...</div>
        <div id="status-p1" class="status">P1: Ausente</div>
        <div id="status-p2" class="status">P2: Ausente</div>
    </div>

    <div id="reset-msg">⟳ A Reiniciar Ciclo ⟳</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
        import { DecalGeometry } from 'three/addons/geometries/DecalGeometry.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { PoseLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

        const statusMain = document.getElementById("status-main");
        const resetMsg = document.getElementById("reset-msg");
        const startBtn = document.getElementById("start-btn");
        const bgMusic = document.getElementById("bg-music");
        const MAX_PIXEL_RATIO = 1.5;
        const DETECTION_INTERVAL_MS = 1000 / 24;
        const BLOOM_CONFIG = { threshold: 0.22, strength: 1.05, radius: 0.58 };
        const BLOOM_PULSE_STRENGTH = 0.9;
        const CHALK_DUST_TEXTURE_URL = 'dust-png-1.png?v=1';
        const MAX_DECALS = 36;
        const DECAL_IMPACT_THRESHOLD = 1.4;

        // --- 0. AUDIO (Sintetizador + Video MOV) ---
        let audioCtx;
        startBtn.addEventListener('click', () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Tenta tocar o ficheiro MOV
                bgMusic.play().then(() => {
                    console.log("Audio de fundo iniciado");
                }).catch(e => {
                    console.log("Erro ao tocar MOV, a tentar sintetizador de emergência.");
                });

                startBtn.style.opacity = '0'; 
                setTimeout(() => startBtn.style.display = 'none', 500);
                startAI(); 
            } catch (e) {
                alert("Erro ao iniciar Audio: " + e.message);
            }
        });

        function playSound(velocity) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const intensity = Math.min(velocity / 8, 1);
            
            // Som mais "dark" e percussivo para combinar com o visual
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(80 + (intensity * 50), audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.2);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(intensity * 0.3, audioCtx.currentTime + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // --- 1. CENA 3D & RASTO ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505); // Fundo quase preto
        scene.fog = new THREE.Fog(0x050505, 9, 22);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);
        camera.position.set(0, 4, 9); 
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, MAX_PIXEL_RATIO));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.autoClearColor = false; 
        document.body.appendChild(renderer.domElement);

        // Plano de Fade (Rasto)
        const fadeMaterial = new THREE.MeshBasicMaterial({
            color: 0x050505, 
            transparent: true,
            opacity: 0.15,
            depthTest: false
        });
        const fadePlane = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), fadeMaterial);
        fadePlane.position.z = -0.1; 
        fadePlane.renderOrder = -1; 
        camera.add(fadePlane);
        scene.add(camera);

        // Luzes
        scene.add(new THREE.HemisphereLight(0xdde7ff, 0x080808, 0.7));

        const keyLight = new THREE.DirectionalLight(0xfff6e0, 1.8);
        keyLight.position.set(6, 11, 8);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(2048, 2048);
        keyLight.shadow.camera.near = 0.5;
        keyLight.shadow.camera.far = 35;
        keyLight.shadow.camera.left = -10;
        keyLight.shadow.camera.right = 10;
        keyLight.shadow.camera.top = 10;
        keyLight.shadow.camera.bottom = -10;
        scene.add(keyLight);

        const rimLight = new THREE.SpotLight(0x7fb3ff, 20, 30, Math.PI / 7, 0.35, 1.2);
        rimLight.position.set(-5, 6, -3);
        rimLight.target.position.set(0, 2, 0);
        scene.add(rimLight);
        scene.add(rimLight.target);

        const fillLight = new THREE.PointLight(0xff7a3d, 8, 18, 2);
        fillLight.position.set(0, 3, 5);
        scene.add(fillLight);

        const backgroundLight = new THREE.PointLight(0x4fd8ff, 2.5, 24, 2);
        backgroundLight.position.set(0, 5, -7);
        scene.add(backgroundLight);

        // Post-processing is handled in a separate composer so the scene can keep a dark stage
        // base while selectively amplifying bright highlights. This gives the installation a
        // theatrical "fluorescent" response without forcing every material to be emissive.
        const composer = new EffectComposer(renderer);
        composer.setPixelRatio(Math.min(window.devicePixelRatio, MAX_PIXEL_RATIO));
        composer.setSize(window.innerWidth, window.innerHeight);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            BLOOM_CONFIG.strength,
            BLOOM_CONFIG.radius,
            BLOOM_CONFIG.threshold
        );
        composer.addPass(bloomPass);

        // --- 2. FÍSICA ---
        // The physics world is tuned for stacks and repeated impacts rather than speed alone.
        // SAPBroadphase is more stable than the naive broadphase for many resting bodies because
        // it reduces unnecessary broadphase pair tests once objects align along the main axes.
        // Higher solver iterations and softer contact relaxation make the pile settle instead of
        // vibrating, which is essential in an installation where "rest" should read as intentional.
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.allowSleep = true;
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.solver.iterations = 15;
        world.solver.tolerance = 0.001;
        
        const matDefault = new CANNON.Material('default');
        const matPlayer = new CANNON.Material('player');
        world.addContactMaterial(new CANNON.ContactMaterial(matDefault, matPlayer, {
            friction: 0.25,
            restitution: 0.08,
            contactEquationStiffness: 5e7,
            contactEquationRelaxation: 4,
            frictionEquationStiffness: 1e7,
            frictionEquationRelaxation: 4
        }));
        world.defaultContactMaterial.friction = 0.45;
        world.defaultContactMaterial.restitution = 0.05;
        world.defaultContactMaterial.contactEquationStiffness = 5e7;
        world.defaultContactMaterial.contactEquationRelaxation = 4;
        world.defaultContactMaterial.frictionEquationStiffness = 1e7;
        world.defaultContactMaterial.frictionEquationRelaxation = 4;

        // Physics and rendering stay separated on purpose:
        // bodies = simulation truth, initialPos = reset targets, instanceScales = visual scaling
        // data for InstancedMesh. This split keeps Cannon authoritative while allowing a very
        // cheap render path on the GPU.
        const bodies = [], initialPos = [], instanceScales = [];
        const gltfLoader = new GLTFLoader();
        const boxSize = 1;
        let modelBaseSize = null;
        let sharedBoxTexture = null;
        let boxGeometry = null;
        let boxMaterial = null;
        let boxInstancedMesh = null;
        let collisionPulse = 0;
        let spotlightImpact = 0;
        let decalTexture = null;
        let decalMaterial = null;
        const collisionFocus = new THREE.Vector3(0, 1.5, 0);
        const instanceDummy = new THREE.Object3D();
        const decalPool = [];
        const decalProxyMesh = new THREE.Mesh();

        // --- TEXTURA ESTILO DIOGO (PRETO E GIZ) ---
        // Aqui está a função completa que tinhas pedido
        function getCardboardTex() {
            const cvs = document.createElement('canvas'); 
            cvs.width = 512; cvs.height = 512; 
            const ctx = cvs.getContext('2d');
            
            // 1. FUNDO PRETO (Roupa)
            ctx.fillStyle = '#1a1a1a'; 
            ctx.fillRect(0,0,512,512);
            
            // 2. TEXTURA (Ruído/Sujidade)
            for(let i=0; i<1000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#333' : '#000';
                ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
            }

            // 3. DESENHOS BRANCOS (Estilo Giz/Rascunho)
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#e0e0e0'; 
            ctx.lineWidth = 3 + Math.random() * 3;

            ctx.beginPath();
            const style = Math.floor(Math.random() * 3); 

            if (style === 0) { 
                // Estilo Abstrato (Caras/Formas)
                let x = 256, y = 150;
                ctx.moveTo(x, y);
                for(let i=0; i<40; i++) {
                    x += (Math.random()-0.5) * 80;
                    y += (Math.random()-0.3) * 60; 
                    if(x<20) x=20; if(x>490) x=490;
                    if(y<20) y=20; if(y>490) y=490;
                    ctx.lineTo(x, y);
                }
            } else if (style === 1) {
                // Estilo Linhas/Texto Ilegível
                for(let row=0; row<6; row++) {
                    let y = 80 + row * 70;
                    let x = 40;
                    ctx.moveTo(x, y);
                    for(let step=0; step<12; step++) {
                        x += 35;
                        ctx.lineTo(x, y + Math.sin(step)*15 + Math.random()*10);
                    }
                }
            } else {
                // Estilo Geometria Caótica
                for(let k=0; k<6; k++) {
                    ctx.moveTo(Math.random()*512, Math.random()*512);
                    ctx.lineTo(Math.random()*512, Math.random()*512);
                }
            }
            ctx.stroke();
            
            // Moldura Branca Suave
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 4;
            ctx.strokeRect(0,0,512,512);

            return new THREE.CanvasTexture(cvs);
        }

        // The material pipeline preserves the authored Blender look whenever possible.
        // Earlier experiments used more procedural shading, but the final installation favors
        // fidelity to the original cube artwork, then normalizes color space/anisotropy so the
        // same asset remains legible under strong bloom and dark stage lighting.
        function applyModelMaterial(root) {
            root.traverse((child) => {
                if (!child.isMesh) return;
                child.castShadow = true;
                child.receiveShadow = true;
                const sourceMaterial = Array.isArray(child.material) ? child.material[0] : child.material;
                child.material = sourceMaterial
                    ? sourceMaterial.clone()
                    : new THREE.MeshStandardMaterial({
                        map: sharedBoxTexture,
                        color: 0xffffff,
                        roughness: 0.82,
                        metalness: 0.08,
                        envMapIntensity: 0.4
                    });
                if (child.material.map) {
                    child.material.map.colorSpace = THREE.SRGBColorSpace;
                    child.material.map.anisotropy = renderer.capabilities.getMaxAnisotropy();
                }
                child.material.needsUpdate = true;
            });
        }

        // InstancedMesh is the core performance optimization of the installation.
        // Instead of cloning one full Three.js hierarchy per box, we upload one geometry/material
        // pair and vary only the transform matrix per instance. This keeps Cannon bodies
        // independent while collapsing rendering into a much smaller number of draw calls.
        function createInstancedBoxes(count) {
            if (boxInstancedMesh) {
                scene.remove(boxInstancedMesh);
            }

            boxInstancedMesh = new THREE.InstancedMesh(boxGeometry, boxMaterial, count);
            boxInstancedMesh.castShadow = true;
            boxInstancedMesh.receiveShadow = true;
            boxInstancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            boxInstancedMesh.frustumCulled = false;
            scene.add(boxInstancedMesh);
        }

        // The imported GLB is normalized once and merged into a single renderable geometry.
        // Doing this upfront avoids paying the cost of traversing/cloning a complex 5MB model
        // for every box at runtime, which is especially important because MediaPipe and bloom
        // are already sharing the same laptop GPU budget.
        async function loadBoxModel() {
            if (boxGeometry && boxMaterial && modelBaseSize) return;
            sharedBoxTexture = sharedBoxTexture || getCardboardTex();

            const gltf = await gltfLoader.loadAsync('cube.glb?v=3');
            const root = gltf.scene;
            const bounds = new THREE.Box3().setFromObject(root);
            const size = new THREE.Vector3();
            const center = new THREE.Vector3();
            bounds.getSize(size);
            bounds.getCenter(center);

            const maxAxis = Math.max(size.x, size.y, size.z) || 1;
            const scale = boxSize / maxAxis;
            root.scale.setScalar(scale);
            root.position.sub(center.multiplyScalar(scale));
            applyModelMaterial(root);
            root.updateMatrixWorld(true);

            const mergedGeometries = [];
            let mergedMaterial = null;
            root.traverse((child) => {
                if (!child.isMesh) return;
                const geometry = child.geometry.clone();
                geometry.applyMatrix4(child.matrixWorld);
                mergedGeometries.push(geometry);

                if (!mergedMaterial) {
                    const material = Array.isArray(child.material) ? child.material[0] : child.material;
                    mergedMaterial = material.clone();
                }
            });

            const mergedGeometry = mergedGeometries.length === 1
                ? mergedGeometries[0]
                : mergeGeometries(mergedGeometries, false);
            mergedGeometry.computeBoundingBox();
            const mergedBounds = mergedGeometry.boundingBox;
            const mergedCenter = mergedBounds.getCenter(new THREE.Vector3());
            const mergedSize = mergedBounds.getSize(new THREE.Vector3());
            mergedGeometry.translate(-mergedCenter.x, -mergedCenter.y, -mergedCenter.z);
            mergedGeometry.computeVertexNormals();
            mergedGeometry.computeBoundingSphere();

            boxGeometry = mergedGeometry;
            boxMaterial = mergedMaterial || new THREE.MeshStandardMaterial({
                map: sharedBoxTexture,
                color: 0xffffff,
                roughness: 0.82,
                metalness: 0.08,
                envMapIntensity: 0.4
            });
            if (boxMaterial.map) {
                boxMaterial.map.colorSpace = THREE.SRGBColorSpace;
                boxMaterial.map.anisotropy = renderer.capabilities.getMaxAnisotropy();
            }
            boxMaterial.needsUpdate = true;
            modelBaseSize = mergedSize;
        }

        function randomStageDimensions(kind = 'mixed') {
            if (kind === 'pillar') {
                return {
                    x: 0.82 + Math.random() * 0.14,
                    y: 1.35 + Math.random() * 0.55,
                    z: 0.82 + Math.random() * 0.14
                };
            }

            if (kind === 'block') {
                return {
                    x: 1.0 + Math.random() * 0.35,
                    y: 0.72 + Math.random() * 0.18,
                    z: 0.9 + Math.random() * 0.24
                };
            }

            return Math.random() < 0.45 ? randomStageDimensions('pillar') : randomStageDimensions('block');
        }

        // Each scenic element still gets its own Cannon body even though rendering is instanced.
        // This keeps collisions believable and lets each box receive decals, sleep, reset and be
        // pushed independently, while the visual layer stays lightweight.
        function createBox(x, y, z, dimensions) {
            const halfExtents = new CANNON.Vec3(dimensions.x * 0.5, dimensions.y * 0.5, dimensions.z * 0.5);
            const scale = new THREE.Vector3(
                dimensions.x / modelBaseSize.x,
                dimensions.y / modelBaseSize.y,
                dimensions.z / modelBaseSize.z
            );
            const body = new CANNON.Body({
                mass: 0.2 * dimensions.x * dimensions.y * dimensions.z,
                position: new CANNON.Vec3(x, y, z),
                shape: new CANNON.Box(halfExtents),
                material: matDefault,
                linearDamping: 0.18,
                angularDamping: 0.5,
                allowSleep: true,
                sleepSpeedLimit: 0.08,
                sleepTimeLimit: 0.45
            });
            body.userData = { scale, lastDecalAt: -Infinity };
            body.addEventListener("collide", (event) => handleBoxCollision(body, event));
            world.addBody(body); bodies.push(body);
            instanceScales.push(scale);
            
            initialPos.push(new CANNON.Vec3(x,y,z));
        }

        // Chão e Grelha
        const floorBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: matDefault });
        floorBody.quaternion.setFromEuler(-Math.PI/2, 0, 0); world.addBody(floorBody);
        const grid = new THREE.GridHelper(30, 30, 0x3a3a3a, 0x111111);
        grid.position.y = -0.001;
        scene.add(grid);

        const floorVisual = new THREE.Mesh(
            new THREE.CircleGeometry(12, 64),
            new THREE.MeshStandardMaterial({
                color: 0x0d0d0d,
                roughness: 0.95,
                metalness: 0.02,
                transparent: true,
                opacity: 0.9
            })
        );
        floorVisual.rotation.x = -Math.PI / 2;
        floorVisual.receiveShadow = true;
        scene.add(floorVisual);

        // Decals are pooled because collision marks are visually useful but geometrically expensive.
        // The pool gives the stage a memory of impacts while capping GPU cost, so the oldest marks
        // disappear first instead of allowing thousands of overlapping decals to accumulate.
        function createDecalMaterial() {
            if (decalMaterial) return decalMaterial;
            decalMaterial = new THREE.MeshStandardMaterial({
                map: decalTexture || createFallbackParticleTexture(),
                color: 0xf8eedc,
                transparent: true,
                depthWrite: false,
                polygonOffset: true,
                polygonOffsetFactor: -2,
                polygonOffsetUnits: -2,
                roughness: 0.96,
                metalness: 0.0
            });
            return decalMaterial;
        }

        function disposeDecalMesh(mesh) {
            scene.remove(mesh);
            mesh.geometry.dispose();
        }

        function pushDecal(mesh) {
            decalPool.push(mesh);
            scene.add(mesh);
            while (decalPool.length > MAX_DECALS) {
                disposeDecalMesh(decalPool.shift());
            }
        }

        function configureDecalProxyMesh(body) {
            decalProxyMesh.geometry = boxGeometry;
            decalProxyMesh.material = boxMaterial;
            decalProxyMesh.position.set(body.position.x, body.position.y, body.position.z);
            decalProxyMesh.quaternion.set(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);
            decalProxyMesh.scale.copy(body.userData.scale);
            decalProxyMesh.updateMatrixWorld(true);
            return decalProxyMesh;
        }

        function getContactWorldPoint(body, contact) {
            const localPoint = contact.bi === body ? contact.ri : contact.rj;
            const worldPoint = new CANNON.Vec3();
            body.quaternion.vmult(localPoint, worldPoint);
            worldPoint.vadd(body.position, worldPoint);
            return new THREE.Vector3(worldPoint.x, worldPoint.y, worldPoint.z);
        }

        function getContactNormalForBody(body, contact) {
            const normal = new CANNON.Vec3();
            if (contact.bi === body) normal.copy(contact.ni);
            else contact.ni.scale(-1, normal);
            return new THREE.Vector3(normal.x, normal.y, normal.z).normalize();
        }

        function addDecalMark(targetMesh, position, normal, size) {
            const safeNormal = normal.clone().normalize();
            if (safeNormal.lengthSq() < 0.0001) safeNormal.set(0, 1, 0);
            const decalPosition = position.clone().addScaledVector(safeNormal, 0.02);
            const decalQuaternion = new THREE.Quaternion().setFromUnitVectors(
                new THREE.Vector3(0, 0, 1),
                safeNormal
            );
            const orientation = new THREE.Euler().setFromQuaternion(decalQuaternion);
            orientation.z += Math.random() * Math.PI * 2;
            const decalSize = new THREE.Vector3(size, size, Math.max(0.08, size * 0.35));
            const geometry = new DecalGeometry(targetMesh, decalPosition, orientation, decalSize);
            if (!geometry.attributes.position || geometry.attributes.position.count === 0) {
                geometry.dispose();
                return;
            }
            const decal = new THREE.Mesh(geometry, createDecalMaterial());
            decal.renderOrder = 2;
            pushDecal(decal);
        }

        function createFloorDecal(position, impact) {
            const radius = THREE.MathUtils.clamp(0.32 + impact * 0.08, 0.32, 0.95);
            const floorPos = new THREE.Vector3(position.x, 0.012, position.z);
            addDecalMark(floorVisual, floorPos, new THREE.Vector3(0, 1, 0), radius);
        }

        function createBoxDecal(body, contact, impact) {
            if (!boxGeometry || !body.userData?.scale) return;
            const normal = getContactNormalForBody(body, contact);
            const position = getContactWorldPoint(body, contact);
            const size = THREE.MathUtils.clamp(0.22 + impact * 0.05, 0.2, 0.55);
            addDecalMark(configureDecalProxyMesh(body), position, normal, size);
        }

        function handleBoxCollision(body, event) {
            const impact = Math.abs(event.contact.getImpactVelocityAlongNormal());
            if (impact < DECAL_IMPACT_THRESHOLD) return;

            const now = performance.now();
            if (now - (body.userData.lastDecalAt || 0) < 90) return;
            body.userData.lastDecalAt = now;

            const other = event.contact.bi === body ? event.contact.bj : event.contact.bi;
            const contactPoint = getContactWorldPoint(body, event.contact);
            triggerCollisionVisuals(impact, contactPoint);

            if (other === floorBody) {
                createFloorDecal(contactPoint, impact);
                return;
            }

            if (other.mass === 0) return;

            if (other.mass > 0 && body.id > other.id) return;
            createBoxDecal(body, event.contact, impact);

            if (other.mass > 0 && other.userData?.scale) {
                createBoxDecal(other, event.contact, impact * 0.92);
            }
        }

        function clearDecals() {
            while (decalPool.length) {
                disposeDecalMesh(decalPool.pop());
            }
        }

        function addPlacement(plan, x, z, dimensions, support = null, gapY = 0.03) {
            const y = support
                ? support.y + support.dimensions.y * 0.5 + dimensions.y * 0.5 + gapY
                : dimensions.y * 0.5;
            const placement = { x, y, z, dimensions, support };
            plan.push(placement);
            return placement;
        }

        function overlapsXZ(a, b, padding = 0.12) {
            return Math.abs(a.x - b.x) < (a.dimensions.x + b.dimensions.x) * 0.5 + padding
                && Math.abs(a.z - b.z) < (a.dimensions.z + b.dimensions.z) * 0.5 + padding;
        }

        function hasPlacementConflict(plan, candidate, padding = 0.12) {
            return plan.some((existing) => {
                const verticalGap = Math.abs(existing.y - candidate.y);
                const stackedSeparation = (existing.dimensions.y + candidate.dimensions.y) * 0.5 + 0.02;
                if (verticalGap >= stackedSeparation) return false;
                return overlapsXZ(existing, candidate, padding);
            });
        }

        function addGroundPlacement(plan, x, z, dimensions, maxAttempts = 28) {
            let candidate = { x, z, dimensions, y: dimensions.y * 0.5 };
            if (!hasPlacementConflict(plan, candidate)) {
                return addPlacement(plan, x, z, dimensions);
            }

            const startX = x;
            const startZ = z;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                const angle = attempt * 1.7;
                const radius = 0.24 * attempt;
                candidate = {
                    x: startX + Math.cos(angle) * radius,
                    z: startZ + Math.sin(angle) * radius,
                    dimensions,
                    y: dimensions.y * 0.5
                };
                if (!hasPlacementConflict(plan, candidate)) {
                    return addPlacement(plan, candidate.x, candidate.z, dimensions);
                }
            }

            return null;
        }

        function sanitizePlan(plan) {
            const stablePlan = [];
            const sorted = [...plan].sort((a, b) => a.y - b.y);

            for (const placement of sorted) {
                if (!placement.support) {
                    if (!hasPlacementConflict(stablePlan, placement, 0.12)) {
                        stablePlan.push({ ...placement });
                    }
                    continue;
                }

                const support = stablePlan.find((item) => item === placement.support || (
                    item.x === placement.support.x &&
                    item.y === placement.support.y &&
                    item.z === placement.support.z
                ));
                if (!support) continue;

                const footprintMarginX = (support.dimensions.x - placement.dimensions.x) * 0.5;
                const footprintMarginZ = (support.dimensions.z - placement.dimensions.z) * 0.5;
                if (footprintMarginX < 0.04 || footprintMarginZ < 0.04) continue;
                if (Math.abs(placement.x - support.x) > footprintMarginX * 0.75) continue;
                if (Math.abs(placement.z - support.z) > footprintMarginZ * 0.75) continue;

                const expectedY = support.y + support.dimensions.y * 0.5 + placement.dimensions.y * 0.5 + 0.02;
                const candidate = { ...placement, y: expectedY, support };
                if (!hasPlacementConflict(stablePlan, candidate, 0.06)) {
                    stablePlan.push(candidate);
                }
            }

            return stablePlan;
        }

        function createWallAggregation(plan, anchorX, anchorZ, options = {}) {
            const segments = options.segments ?? (4 + Math.floor(Math.random() * 3));
            const angle = options.angle ?? (Math.random() * Math.PI);
            const dirX = Math.cos(angle);
            const dirZ = Math.sin(angle);
            const sideX = -dirZ;
            const sideZ = dirX;
            const spacing = options.spacing ?? 0.16;
            const placements = [];
            const baseDimensions = Array.from({ length: segments }, () => randomStageDimensions(Math.random() < 0.35 ? 'pillar' : 'block'));
            const totalLength = baseDimensions.reduce((sum, dims, idx) => {
                return sum + dims.x + (idx < baseDimensions.length - 1 ? spacing : 0);
            }, 0);
            let cursor = -totalLength * 0.5;
            for (let i = 0; i < segments; i++) {
                const dimensions = baseDimensions[i];
                const offset = cursor + dimensions.x * 0.5;
                const lateral = (Math.random() - 0.5) * 0.18;
                const x = anchorX + dirX * offset + sideX * lateral;
                const z = anchorZ + dirZ * offset + sideZ * lateral;
                const placed = addGroundPlacement(plan, x, z, dimensions);
                if (!placed) {
                    cursor += dimensions.x + spacing;
                    continue;
                }
                placements.push(placed);

                if (Math.random() < 0.25) {
                    const topKind = Math.random() < 0.6 ? 'pillar' : 'block';
                    const topDimensions = randomStageDimensions(topKind);
                    topDimensions.x = Math.min(topDimensions.x, dimensions.x * 0.82);
                    topDimensions.z = Math.min(topDimensions.z, dimensions.z * 0.82);
                    addPlacement(
                        plan,
                        placed.x,
                        placed.z,
                        topDimensions,
                        placed,
                        0.025
                    );
                }

                cursor += dimensions.x + spacing;
            }
        }

        function createPlatformAggregation(plan, anchorX, anchorZ, options = {}) {
            const cols = options.cols ?? (2 + Math.floor(Math.random() * 2));
            const rows = options.rows ?? (2 + Math.floor(Math.random() * 2));
            const gap = options.gap ?? 0.06;
            const cells = [];

            let totalWidth = 0;
            for (let col = 0; col < cols; col++) {
                const colWidth = 0.9 + Math.random() * 0.28;
                cells.push(colWidth);
                totalWidth += colWidth;
                if (col < cols - 1) totalWidth += gap;
            }

            let xCursor = anchorX - totalWidth * 0.5;
            for (let col = 0; col < cols; col++) {
                const width = cells[col];
                for (let row = 0; row < rows; row++) {
                    const dimensions = randomStageDimensions('block');
                    dimensions.x = width;
                    dimensions.y *= 0.85;
                    dimensions.z = 0.82 + Math.random() * 0.22;
                    const z = anchorZ + (row - (rows - 1) * 0.5) * (dimensions.z + gap * 0.8);
                    addGroundPlacement(plan, xCursor + width * 0.5, z, dimensions);
                }
                xCursor += width + gap;
            }

            if (Math.random() < 0.35) {
                const hero = randomStageDimensions(Math.random() < 0.5 ? 'pillar' : 'block');
                const support = plan.reduce((best, item) => {
                    if (item.y > item.dimensions.y * 0.5 + 0.001) return best;
                    if (item.dimensions.x < 0.95 || item.dimensions.z < 0.85) return best;
                    const dist = Math.hypot(item.x - anchorX, item.z - anchorZ);
                    if (!best || dist < best.dist) return { item, dist };
                    return best;
                }, null)?.item;
                if (support) {
                    hero.x = Math.min(hero.x, support.dimensions.x * 0.78);
                    hero.z = Math.min(hero.z, support.dimensions.z * 0.78);
                    addPlacement(plan, support.x, support.z, hero, support, 0.025);
                }
            }
        }

        function createColumnAggregation(plan, anchorX, anchorZ, options = {}) {
            const count = options.count ?? (3 + Math.floor(Math.random() * 3));
            const radius = options.radius ?? (1.05 + Math.random() * 0.3);
            const supports = [];

            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2 + Math.random() * 0.35;
                const x = anchorX + Math.cos(angle) * radius;
                const z = anchorZ + Math.sin(angle) * radius;
                const kind = i % 2 === 0 ? 'pillar' : 'block';
                const placed = addGroundPlacement(plan, x, z, randomStageDimensions(kind));
                supports.push(placed);
            }

            const centerBase = addGroundPlacement(plan, anchorX, anchorZ, randomStageDimensions('block'));
            if (centerBase && Math.random() < 0.5) {
                const top = randomStageDimensions('pillar');
                top.x = Math.min(top.x * 0.82, centerBase.dimensions.x * 0.78);
                top.z = Math.min(top.z * 0.82, centerBase.dimensions.z * 0.78);
                addPlacement(plan, anchorX, anchorZ, top, centerBase, 0.02);
            }
        }

        async function buildStack() {
            statusMain.innerText = 'A carregar modelo 3D...';
            try {
                await loadBoxModel();
            } catch (err) {
                console.error(err);
                statusMain.innerText = 'Erro ao carregar modelo 3D.';
                throw err;
            }

            bodies.forEach((body) => world.removeBody(body));
            bodies.length = 0;
            initialPos.length = 0;
            instanceScales.length = 0;
            clearDecals();

            const plan = [];

            createWallAggregation(plan, -2.3, -0.85, { segments: 5, angle: Math.PI * 0.48 });
            createWallAggregation(plan, 2.3, -0.9, { segments: 5, angle: Math.PI * 0.52 });
            createWallAggregation(plan, -1.8, 1.15, { segments: 4, angle: Math.PI * 0.18 });
            createWallAggregation(plan, 1.95, 1.2, { segments: 4, angle: Math.PI * 0.82 });

            createPlatformAggregation(plan, 0, -1.65, { cols: 3, rows: 2, gap: 0.07 });
            createPlatformAggregation(plan, 0.15, 1.85, { cols: 2, rows: 2, gap: 0.06 });

            createColumnAggregation(plan, -2.65, 0.55, { count: 4, radius: 1.12 });
            createColumnAggregation(plan, 2.65, 0.45, { count: 4, radius: 1.12 });

            const stablePlan = sanitizePlan(plan);
            createInstancedBoxes(stablePlan.length);
            stablePlan.forEach((item) => createBox(item.x, item.y, item.z, item.dimensions));
        }

        // --- 3. PARTÍCULAS (SPRITES ORGÂNICOS) ---
        const particles = [];
        const particleTexture = createParticleTexture();
        for(let i=0; i<60; i++) {
            const p = new THREE.Sprite(new THREE.SpriteMaterial({
                map: particleTexture,
                color: new THREE.Color().setHSL(0.08 + Math.random() * 0.04, 0.55, 0.88),
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            }));
            p.visible = false;
            p.scale.setScalar(0.5);
            scene.add(p);
            particles.push(p);
            p.userData = { life: 0, vel: new THREE.Vector3(), spin: 0 };
        }

        // The particle texture loader accepts artist-provided PNGs but converts them into a usable
        // alpha texture at runtime. This keeps the installation flexible: image assets can be
        // sourced externally, while the code still guarantees they behave like soft chalk sprites
        // over a black background.
        function createParticleTexture() {
            const fallbackTexture = createFallbackParticleTexture();
            const loader = new THREE.TextureLoader();
            loader.load(
                CHALK_DUST_TEXTURE_URL,
                (loadedTexture) => {
                    const dustTexture = createDustTextureFromImage(loadedTexture.image);
                    decalTexture = dustTexture;
                    if (decalMaterial) {
                        decalMaterial.map = dustTexture;
                        decalMaterial.needsUpdate = true;
                    }
                    for (const particle of particles) {
                        particle.material.map = dustTexture;
                        particle.material.needsUpdate = true;
                    }
                },
                undefined,
                (err) => {
                    console.warn('Chalk dust PNG not found, using fallback dust sprite.', err);
                }
            );
            return fallbackTexture;
        }

        // This image-processing step is the current texture-processing substitute for a custom
        // surface shader: it derives transparency from luminance so non-transparent PNGs can still
        // behave like additive chalk dust. In the thesis you can describe it as a material-space
        // preprocessing stage that prepares artist assets for real-time compositing.
        function createDustTextureFromImage(image) {
            const cvs = document.createElement('canvas');
            cvs.width = image.naturalWidth || image.width;
            cvs.height = image.naturalHeight || image.height;
            const ctx = cvs.getContext('2d');
            ctx.drawImage(image, 0, 0, cvs.width, cvs.height);

            const data = ctx.getImageData(0, 0, cvs.width, cvs.height);
            for (let i = 0; i < data.data.length; i += 4) {
                const r = data.data[i];
                const g = data.data[i + 1];
                const b = data.data[i + 2];
                const luminance = (r * 0.299) + (g * 0.587) + (b * 0.114);
                const alpha = THREE.MathUtils.clamp((255 - luminance) * 1.7, 0, 255);

                data.data[i] = 255;
                data.data[i + 1] = 245;
                data.data[i + 2] = 220;
                data.data[i + 3] = alpha;
            }
            ctx.putImageData(data, 0, 0);

            const texture = new THREE.CanvasTexture(cvs);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.wrapS = THREE.ClampToEdgeWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            texture.needsUpdate = true;
            return texture;
        }

        function createFallbackParticleTexture() {
            const cvs = document.createElement('canvas');
            cvs.width = 192;
            cvs.height = 192;
            const ctx = cvs.getContext('2d');
            ctx.translate(96, 96);
            ctx.beginPath();
            for (let i = 0; i < 18; i++) {
                const angle = (i / 18) * Math.PI * 2;
                const radius = 42 + Math.sin(i * 1.7) * 10 + Math.random() * 16;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            const grad = ctx.createRadialGradient(0, 0, 8, 0, 0, 78);
            grad.addColorStop(0, 'rgba(255,255,255,0.98)');
            grad.addColorStop(0.22, 'rgba(255,244,214,0.9)');
            grad.addColorStop(0.52, 'rgba(255,196,143,0.45)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fill();
            for (let i = 0; i < 65; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 70;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random() * 0.08})`;
                ctx.beginPath();
                ctx.arc(x, y, 1 + Math.random() * 5, 0, Math.PI * 2);
                ctx.fill();
            }
            const texture = new THREE.CanvasTexture(cvs);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.needsUpdate = true;
            return texture;
        }

        function spawnExplosion(pos) {
            let count = 0;
            for(let p of particles) {
                if(!p.visible && count < 10) {
                    p.visible = true;
                    p.position.copy(pos);
                    p.position.y += 0.15;
                    p.material.opacity = 1;
                    p.scale.setScalar(0.28 + Math.random() * 0.52);
                    p.userData.life = 1.0;
                    p.userData.spin = (Math.random() - 0.5) * 0.1;
                    p.userData.vel.set((Math.random()-0.5)*0.18, Math.random()*0.18 + 0.04, (Math.random()-0.5)*0.18);
                    count++;
                }
            }
        }

        function triggerCollisionVisuals(impact, pos) {
            const energy = Math.min(impact / 6, 1.2);
            collisionPulse = Math.max(collisionPulse, energy);
            spotlightImpact = Math.max(spotlightImpact, impact);
            collisionFocus.set(pos.x, pos.y + 1, pos.z);
            rimLight.position.set(pos.x + 1.8, pos.y + 3.6, pos.z + 1.8);
            rimLight.target.position.copy(collisionFocus);
            backgroundLight.position.set(pos.x * 0.4, 4 + energy, -6 + pos.z * 0.2);
        }

        function wakeNearbyBoxes(x, y, z, radius = 2.2) {
            const radiusSq = radius * radius;
            for (const body of bodies) {
                const dx = body.position.x - x;
                const dy = body.position.y - y;
                const dz = body.position.z - z;
                if ((dx * dx) + (dy * dy) + (dz * dz) <= radiusSq) {
                    body.wakeUp();
                }
            }
        }

        // --- 4. JOGADORES (Silhuetas) ---
        const LINKS = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24]];

        function createLine(color) {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(LINKS.length * 6);
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            return new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ color: color, linewidth: 2, transparent: true, opacity: 0.8 }));
        }

        function createHandBody() {
            const body = new CANNON.Body({
                mass: 0,
                type: CANNON.Body.KINEMATIC,
                position: new CANNON.Vec3(0, -5, 0),
                shape: new CANNON.Sphere(1.05),
                material: matPlayer,
                collisionResponse: true
            });
            body.userData = { lastPos: new CANNON.Vec3(0, -5, 0) };
            body.updateMassProperties();
            world.addBody(body);
            body.addEventListener("collide", (e) => {
                const impact = e.contact.getImpactVelocityAlongNormal();
                if(Math.abs(impact) > 0.8) {
                    let obj = (e.contact.bi === body) ? e.contact.bj : e.contact.bi;
                    if(obj.mass > 0) { 
                        spawnExplosion(body.position);
                        playSound(Math.abs(impact));
                        triggerCollisionVisuals(Math.abs(impact), body.position);
                    }
                }
            });
            return body;
        }

        const players = [
            { id: 0, name: "P1", color: 0xffaaaa, hands: [], line: null, div: document.getElementById('status-p1') },
            { id: 1, name: "P2", color: 0xaaddff, hands: [], line: null, div: document.getElementById('status-p2') }
        ];

        players.forEach(p => {
            p.hands = [createHandBody(), createHandBody()];
            p.line = createLine(p.color);
            scene.add(p.line);
        });

        // --- 5. LOGICA & RESET ---
        let lastSeen = Date.now();
        let isResetting = false;

        function updateReset() {
            if(!isResetting) return;
            let done = true;
            for(let i=0; i<bodies.length; i++) {
                bodies[i].velocity.set(0,0,0);
                bodies[i].angularVelocity.set(0,0,0);
                
                bodies[i].position.x += (initialPos[i].x - bodies[i].position.x) * 0.05;
                bodies[i].position.y += (initialPos[i].y - bodies[i].position.y) * 0.05;
                bodies[i].position.z += (initialPos[i].z - bodies[i].position.z) * 0.05;
                bodies[i].quaternion.slerp(new CANNON.Quaternion(0,0,0,1), 0.05);

                if(bodies[i].position.distanceTo(initialPos[i]) > 0.05) done = false;
            }
            if(done) { isResetting = false; resetMsg.style.opacity = 0; }
        }

        // --- 6. IA / MEDIAPIPE ---
        // MediaPipe is treated as an interaction layer, not as a visual effect.
        // Detection is throttled and converted into kinematic hand bodies so the installation
        // remains responsive on standard laptops while still letting the physics engine handle
        // the actual impacts. This separation is important: AI estimates intent, physics delivers
        // believable motion.
        const video = document.getElementById("webcam");
        let landmarker;
        let lastDetectAt = 0;

        // AI startup is deferred until the user explicitly begins the installation because both
        // webcam access and model initialization are expensive. Loading them lazily reduces the
        // chance of a heavy first frame and keeps browser permission flow predictable in exhibition.
        async function startAI() {
            try {
                statusMain.innerText = "A carregar IA...";
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                landmarker = await PoseLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task`, delegate: "GPU" },
                    runningMode: "VIDEO", numPoses: 2
                });
                await buildStack();
                statusMain.innerText = "Ligado! Entra na câmara.";
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.addEventListener("loadeddata", predict);
            } catch (err) {
                statusMain.innerText = "Erro: " + err.message;
            }
        }

        // MediaPipe landmarks arrive in normalized camera space. We remap them into stage space so
        // the visitor's body becomes a physical performer inside the set, rather than a UI overlay.
        function map(lm) {
            return {
                x: (0.5 - lm.x) * 12,
                y: (1 - lm.y) * 8,
                z: THREE.MathUtils.clamp(-lm.z * 14, -2.4, 2.4)
            };
        }

        let lastTime = -1;
        // The prediction loop uses the minimum amount of AI work needed for convincing interaction.
        // By throttling inference and deriving collider velocity from landmark deltas, the code
        // transforms noisy pose data into impacts that feel intentional without running detection
        // at the full render frame rate.
        async function predict() {
            const nowMs = performance.now();
            if (landmarker && video.currentTime !== lastTime && nowMs - lastDetectAt >= DETECTION_INTERVAL_MS) {
                const previousTime = lastTime;
                lastTime = video.currentTime;
                lastDetectAt = nowMs;
                const result = await landmarker.detectForVideo(video, nowMs);
                
                let active = false;
                players.forEach((p, idx) => {
                    if(result.landmarks[idx]) {
                        active = true;
                        if(isResetting) isResetting = false;

                        const lms = result.landmarks[idx];
                        const dt = previousTime >= 0 ? Math.max(video.currentTime - previousTime, 1 / 60) : 1 / 60;
                        const wrists = [lms[15], lms[16]];
                        wrists.forEach((wrist, handIdx) => {
                            const handBody = p.hands[handIdx];
                            if (!wrist) {
                                handBody.velocity.set(0, 0, 0);
                                handBody.position.set(0, -10, 0);
                                handBody.aabbNeedsUpdate = true;
                                handBody.userData.lastPos.set(0, -10, 0);
                                return;
                            }

                            const hand = map(wrist);
                            const lastPos = handBody.userData.lastPos;
                            handBody.velocity.set(
                                (hand.x - lastPos.x) / dt,
                                (hand.y - lastPos.y) / dt,
                                (hand.z - lastPos.z) / dt
                            );
                            handBody.position.set(hand.x, hand.y, hand.z);
                            handBody.aabbNeedsUpdate = true;
                            handBody.userData.lastPos.set(hand.x, hand.y, hand.z);
                            wakeNearbyBoxes(hand.x, hand.y, hand.z);
                        });

                        const arr = p.line.geometry.attributes.position.array;
                        let k = 0;
                        LINKS.forEach(pair => {
                            const pointA = lms[pair[0]];
                            const pointB = lms[pair[1]];
                            if (!pointA || !pointB) return;
                            const a = map(pointA);
                            const b = map(pointB);
                            arr[k++] = a.x; arr[k++] = a.y; arr[k++] = a.z;
                            arr[k++] = b.x; arr[k++] = b.y; arr[k++] = b.z;
                        });
                        while (k < arr.length) arr[k++] = 0;
                        p.line.geometry.attributes.position.needsUpdate = true;
                        p.line.visible = true;
                        p.div.innerText = p.name + ": Conectado";
                    } else {
                        p.hands.forEach((handBody) => {
                            handBody.velocity.set(0, 0, 0);
                            handBody.position.set(0, -10, 0);
                            handBody.aabbNeedsUpdate = true;
                            handBody.userData.lastPos.set(0, -10, 0);
                        });
                        p.line.visible = false;
                        p.div.innerText = p.name + ": Ausente";
                    }
                });

                if(active) {
                    lastSeen = Date.now();
                    resetMsg.style.opacity = 0;
                } else if (!isResetting && Date.now() - lastSeen > 3000) {
                    isResetting = true;
                    resetMsg.style.opacity = 1;
                }
            }
            requestAnimationFrame(predict);
        }

        // Loop Principal
        let lastPhysicsTime = performance.now() / 1000;
        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now() / 1000;
            const delta = Math.min(now - lastPhysicsTime, 0.05);
            lastPhysicsTime = now;
            
            if(!isResetting) world.step(1/60, delta, 4);
            else updateReset();

            collisionPulse *= 0.9;
            spotlightImpact *= 0.88;
            rimLight.intensity = 7 + spotlightImpact * 2.6 + collisionPulse * 10;
            fillLight.intensity = 4 + collisionPulse * 10;
            backgroundLight.intensity = 2.5 + collisionPulse * 7;
            renderer.toneMappingExposure = 1.05 + collisionPulse * 0.18;
            bloomPass.threshold = Math.max(0.14, BLOOM_CONFIG.threshold - collisionPulse * 0.05);
            bloomPass.radius = BLOOM_CONFIG.radius + collisionPulse * 0.08;
            bloomPass.strength = BLOOM_CONFIG.strength + collisionPulse * BLOOM_PULSE_STRENGTH;

            if (boxInstancedMesh) {
                for (let i = 0; i < bodies.length; i++) {
                    const body = bodies[i];
                    const scale = instanceScales[i];
                    instanceDummy.position.set(body.position.x, body.position.y, body.position.z);
                    instanceDummy.quaternion.set(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);
                    instanceDummy.scale.copy(scale);
                    instanceDummy.updateMatrix();
                    boxInstancedMesh.setMatrixAt(i, instanceDummy.matrix);
                }
                boxInstancedMesh.instanceMatrix.needsUpdate = true;
            }

            for(let p of particles) {
                if(p.visible) {
                    p.position.add(p.userData.vel);
                    p.userData.vel.multiplyScalar(0.94);
                    p.userData.vel.y -= 0.0025;
                    p.userData.life -= 0.028;
                    p.material.opacity = p.userData.life * 0.72;
                    p.material.rotation += p.userData.spin;
                    p.scale.multiplyScalar(1.012);
                    if(p.userData.life <= 0) p.visible = false;
                }
            }

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, MAX_PIXEL_RATIO));
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setPixelRatio(Math.min(window.devicePixelRatio, MAX_PIXEL_RATIO));
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

        }

        function ensureSymbolBadgeMaterials() {
            if (symbolBadgeGeometry) return;
            symbolBadgeGeometry = new THREE.PlaneGeometry(0.44, 0.44);
            // BasicMaterial: no per-fragment lighting math — enough for flat icon cards.
            symbolWaterMaterial = new THREE.MeshBasicMaterial({
                map: canvasTextureFromCanvas(makeWaterSymbolCanvas()),
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                polygonOffset: true,
                polygonOffsetFactor: -1
            });
            symbolNatureMaterial = new THREE.MeshBasicMaterial({
                map: canvasTextureFromCanvas(makeNatureSymbolCanvas()),
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                polygonOffset: true,
                polygonOffsetFactor: -1
            });
            symbolFireMaterial = new THREE.MeshBasicMaterial({
                map: canvasTextureFromCanvas(makeFireSymbolCanvas()),
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                polygonOffset: true,
                polygonOffsetFactor: -1
            });
            symbolLightMaterial = new THREE.MeshBasicMaterial({
                map: canvasTextureFromCanvas(makeLightSymbolCanvas()),
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                polygonOffset: true,
                polygonOffsetFactor: -1
            });
        }

        function attachSymbolBadgeToBody(body) {
            const tag = body.userData?.soundSymbol;
            ensureSymbolBadgeMaterials();
            const matByTag = {
                water: symbolWaterMaterial,
                nature: symbolNatureMaterial,
                fire: symbolFireMaterial,
                light: symbolLightMaterial
            };
            const mat = matByTag[tag];
            if (!mat) return;
            const mesh = new THREE.Mesh(symbolBadgeGeometry, mat);
            mesh.castShadow = false;
            mesh.receiveShadow = false;
            mesh.renderOrder = 6;
            mesh.frustumCulled = false;
            scene.add(mesh);
            body.userData.symbolMesh = mesh;
        }

        function disposeAllSymbolBadgeMeshes() {
            for (const body of bodies) {
                const sm = body.userData?.symbolMesh;
                if (!sm) continue;
                scene.remove(sm);
                body.userData.symbolMesh = null;
            }
            if (symbolBadgeGeometry) {
                symbolBadgeGeometry.dispose();
                symbolBadgeGeometry = null;
            }
            if (symbolWaterMaterial) {
                if (symbolWaterMaterial.map) symbolWaterMaterial.map.dispose();
                symbolWaterMaterial.dispose();
                symbolWaterMaterial = null;
            }
            if (symbolNatureMaterial) {
                if (symbolNatureMaterial.map) symbolNatureMaterial.map.dispose();
                symbolNatureMaterial.dispose();
                symbolNatureMaterial = null;
            }
            if (symbolFireMaterial) {
                if (symbolFireMaterial.map) symbolFireMaterial.map.dispose();
                symbolFireMaterial.dispose();
                symbolFireMaterial = null;
            }
            if (symbolLightMaterial) {
                if (symbolLightMaterial.map) symbolLightMaterial.map.dispose();
                symbolLightMaterial.dispose();
                symbolLightMaterial = null;
            }
        }

        function updateSymbolBadgeMeshes() {
            for (const body of bodies) {
                const sm = body.userData?.symbolMesh;
                if (!sm) continue;
                // Sleeping bodies keep a fixed pose; skipping saves CPU on settled piles.
                if (body.sleepState === CANNON.Body.SLEEPING) continue;
                const shape = body.shapes?.[0];
                const hz = shape?.halfExtents?.z;
                if (hz == null) continue;
                symbolBadgeOffsetLocal.set(0, 0.07 * (body.userData.scale?.y ?? 1), hz + 0.045);
                body.quaternion.vmult(symbolBadgeOffsetLocal, symbolBadgeWorldOffset);
                sm.position.set(
                    body.position.x + symbolBadgeWorldOffset.x,
                    body.position.y + symbolBadgeWorldOffset.y,
                    body.position.z + symbolBadgeWorldOffset.z
                );
                sm.quaternion.set(
                    body.quaternion.x,
                    body.quaternion.y,
                    body.quaternion.z,
                    body.quaternion.w
                );
                const sc = body.userData.scale;
                const k = (Math.min(sc.x, sc.y, sc.z) * 0.92) + 0.16;
                sm.scale.setScalar(k);
            }
        }
        // Aqui está a função completa que tinhas pedido
        function getCardboardTex() {
            const cvs = document.createElement('canvas'); 
            cvs.width = 512; cvs.height = 512; 
            const ctx = cvs.getContext('2d');
            
            // 1. FUNDO PRETO (Roupa)
            ctx.fillStyle = '#1a1a1a'; 
            ctx.fillRect(0,0,512,512);
            
            // 2. TEXTURA (Ruído/Sujidade)
            for(let i=0; i<1000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#333' : '#000';
                ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
            }

            // 3. DESENHOS BRANCOS (Estilo Giz/Rascunho)
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#e0e0e0'; 
            ctx.lineWidth = 3 + Math.random() * 3;

            ctx.beginPath();
            const style = Math.floor(Math.random() * 3); 

            if (style === 0) { 
                // Estilo Abstrato (Caras/Formas)
                let x = 256, y = 150;
                ctx.moveTo(x, y);
                for(let i=0; i<40; i++) {
                    x += (Math.random()-0.5) * 80;
                    y += (Math.random()-0.3) * 60; 
                    if(x<20) x=20; if(x>490) x=490;
                    if(y<20) y=20; if(y>490) y=490;
                    ctx.lineTo(x, y);
                }
            } else if (style === 1) {
                // Estilo Linhas/Texto Ilegível
                for(let row=0; row<6; row++) {
                    let y = 80 + row * 70;
                    let x = 40;
                    ctx.moveTo(x, y);
                    for(let step=0; step<12; step++) {
                        x += 35;
                        ctx.lineTo(x, y + Math.sin(step)*15 + Math.random()*10);
                    }
                }
            } else {
                // Estilo Geometria Caótica
                for(let k=0; k<6; k++) {
                    ctx.moveTo(Math.random()*512, Math.random()*512);
                    ctx.lineTo(Math.random()*512, Math.random()*512);
                }
            }
            ctx.stroke();
            
            // Moldura Branca Suave
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 4;
            ctx.strokeRect(0,0,512,512);

            return new THREE.CanvasTexture(cvs);
        }

        // InstancedMesh shares one geometry + one materials array across instances.
        // Per-face variety therefore requires one InstancedMesh per face-pattern
        // variant (we picked four). We dispose every previous mesh on rebuild so
        // textures and GPU buffers are released cleanly between resets.
        function createInstancedMeshesForCounts(counts) {
            if (boxInstancedMeshes) {
                for (const m of boxInstancedMeshes) {
                    if (!m) continue;
                    scene.remove(m);
                    if (m.dispose) m.dispose();
                }
            }
            boxInstancedMeshes = FACE_VARIANTS.map((_, vIdx) => {
                const count = counts[vIdx] || 0;
                if (count === 0) return null;
                const mesh = new THREE.InstancedMesh(
                    boxGeometry,
                    variantMaterialsArrays[vIdx],
                    count
                );
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                mesh.frustumCulled = false;
                scene.add(mesh);
                return mesh;
            });
        }

        // Phase 1 of Step 3: instead of merging the GLB into one shared geometry,
        // we extract its texture (so the artist's chalk drawing is preserved) and
        // wrap it on a procedural unit BoxGeometry. BoxGeometry exposes 6 face
        // groups out of the box, which is what enables per-face material control.
        async function loadBoxModel() {
            if (variantMaterialsArrays && modelBaseSize) return;

            // 1. Source the chalk-drawing texture. We try the GLB first to keep
            //    the original artist-authored map, and fall back to the procedural
            //    cardboard canvas if the GLB cannot be loaded.
            let extractedTexture = null;
            try {
                const gltf = await gltfLoader.loadAsync('cube.glb?v=3');
                gltf.scene.traverse((child) => {
                    if (extractedTexture) return;
                    if (!child.isMesh) return;
                    const m = Array.isArray(child.material) ? child.material[0] : child.material;
                    if (m && m.map) extractedTexture = m.map;
                });
            } catch (err) {
                console.warn("[step3] cube.glb could not be loaded; using procedural chalk texture only.", err);
            }
            if (!extractedTexture) extractedTexture = getCardboardTex();
            sharedBoxTexture = extractedTexture;
            sharedBoxTexture.colorSpace = THREE.SRGBColorSpace;
            sharedBoxTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            sharedBoxTexture.needsUpdate = true;

            // 2. Procedural unit cube. Each face maps 1:1 to one of the six
            //    material slots (BoxGeometry generates "groups" automatically).
            //    Per-instance scaling later turns this into pillars/blocks.
            boxGeometry = new THREE.BoxGeometry(1, 1, 1);
            boxGeometry.computeBoundingBox();
            boxGeometry.computeBoundingSphere();

            // 3. The two physical-looking materials we mix per variant.
            texturedFaceMaterial = new THREE.MeshStandardMaterial({
                map: sharedBoxTexture,
                color: 0xffffff,
                roughness: 0.82,
                metalness: 0.08,
                envMapIntensity: 0.4
            });
            neutralFaceMaterial = new THREE.MeshStandardMaterial({
                color: 0x1f1d1a,
                roughness: 0.95,
                metalness: 0.04,
                envMapIntensity: 0.30
            });

            // 4. Pre-build a 6-slot materials array per variant. We reuse the
            //    same two material instances across all variants and across all
            //    InstancedMesh objects, so total live materials stay at exactly 2.
            variantMaterialsArrays = FACE_VARIANTS.map((v) => {
                const arr = new Array(6).fill(neutralFaceMaterial);
                for (const idx of v.textured) arr[idx] = texturedFaceMaterial;
                return arr;
            });

            // The decal proxy mesh expects boxGeometry + boxMaterial on its mesh
            // properties. Keeping a singular alias avoids touching that path.
            boxMaterial = neutralFaceMaterial;
            modelBaseSize = new THREE.Vector3(1, 1, 1);
        }

        function randomStageDimensions(kind = 'mixed') {
            if (kind === 'pillar') {
                return {
                    x: 0.82 + Math.random() * 0.14,
                    y: 1.35 + Math.random() * 0.55,
                    z: 0.82 + Math.random() * 0.14
                };
            }

            if (kind === 'block') {
                return {
                    x: 1.0 + Math.random() * 0.35,
                    y: 0.72 + Math.random() * 0.18,
                    z: 0.9 + Math.random() * 0.24
                };
            }

            return Math.random() < 0.45 ? randomStageDimensions('pillar') : randomStageDimensions('block');
        }

        // Each scenic element still gets its own Cannon body even though rendering is instanced.
        // This keeps collisions believable and lets each box receive decals, sleep, reset and be
        // pushed independently, while the visual layer stays lightweight.
        // opts: { variantIdx, instanceIdxInVariant, initialQuat, soundSymbol }
        function createBox(x, y, z, dimensions, opts = {}) {
            const halfExtents = new CANNON.Vec3(dimensions.x * 0.5, dimensions.y * 0.5, dimensions.z * 0.5);
            const scale = new THREE.Vector3(
                dimensions.x / modelBaseSize.x,
                dimensions.y / modelBaseSize.y,
                dimensions.z / modelBaseSize.z
            );
            const body = new CANNON.Body({
                mass: 0.2 * dimensions.x * dimensions.y * dimensions.z,
                position: new CANNON.Vec3(x, y, z),
                shape: new CANNON.Box(halfExtents),
                material: matDefault,
                linearDamping: 0.18,
                angularDamping: 0.5,
                allowSleep: true,
                sleepSpeedLimit: 0.08,
                sleepTimeLimit: 0.45
            });
            // Phase 2: apply the chosen initial rotation to the physics body.
            // Cannon resolves contacts from this orientation, so a "lying" box
            // genuinely rests on its side instead of just looking that way.
            if (opts.initialQuat) {
                body.quaternion.set(
                    opts.initialQuat.x,
                    opts.initialQuat.y,
                    opts.initialQuat.z,
                    opts.initialQuat.w
                );
            }
            body.userData = {
                scale,
                lastDecalAt: -Infinity,
                lastSfxAt: -Infinity,
                heldBy: null,
                savedDamping: null,
                _maskBeforeGrab: undefined,
                variantIdx: opts.variantIdx ?? 0,
                instanceIdxInVariant: opts.instanceIdxInVariant ?? 0,
                // Step 4: drives which procedural stinger plays on impact + badge on +Z face.
                soundSymbol: opts.soundSymbol ?? 'neutral'
            };
            body.addEventListener("collide", (event) => handleBoxCollision(body, event));
            world.addBody(body); bodies.push(body);
            instanceScales.push(scale);

            initialPos.push(new CANNON.Vec3(x, y, z));
            initialQuats.push(opts.initialQuat
                ? new CANNON.Quaternion(opts.initialQuat.x, opts.initialQuat.y, opts.initialQuat.z, opts.initialQuat.w)
                : new CANNON.Quaternion(0, 0, 0, 1));
            attachSymbolBadgeToBody(body);
        }

        // --- STEP 3 helpers ---
        // Weighted categorical sampling. Returns an index into `weights`.
        function pickWeightedIndex(weights) {
            let r = Math.random();
            for (let i = 0; i < weights.length; i++) {
                r -= weights[i];
                if (r <= 0) return i;
            }
            return weights.length - 1;
        }

        // Phase 2: choose an initial orientation. Stacked boxes are kept upright
        // because the placement code carefully computed their resting Y on top
        // of a support; rotating them would intersect the support and break the
        // pile. Ground boxes can lie flat (90 degrees on X or Z) or just tilt
        // slightly for natural variety.
        function pickInitialRotation(placement) {
            const result = { quat: new CANNON.Quaternion(0, 0, 0, 1), lying: false, lyingAxis: null };
            const isGround = !placement.support;
            if (!isGround) return result;

            if (Math.random() < LYING_PROBABILITY) {
                const axis = Math.random() < 0.5 ? 'x' : 'z';
                const sign = Math.random() < 0.5 ? 1 : -1;
                if (axis === 'x') result.quat.setFromEuler(sign * Math.PI / 2, 0, 0);
                else              result.quat.setFromEuler(0, 0, sign * Math.PI / 2);
                result.lying = true;
                result.lyingAxis = axis;
                return result;
            }
            if (Math.random() < TILT_PROBABILITY) {
                const tx = (Math.random() - 0.5) * TILT_MAX_RAD * 2;
                const tz = (Math.random() - 0.5) * TILT_MAX_RAD * 2;
                result.quat.setFromEuler(tx, 0, tz);
            }
            return result;
        }

        // After a 90-degree rotation, the half-extent that used to point up is
        // now pointing sideways, so the new resting Y must use a different axis.
        // Around X: +y maps to +z, so half-height becomes dimensions.z/2.
        // Around Z: +y maps to +x, so half-height becomes dimensions.x/2.
        function adjustYForRotation(placement, rotInfo) {
            if (!rotInfo.lying) return placement.y;
            if (rotInfo.lyingAxis === 'x') return placement.dimensions.z * 0.5;
            if (rotInfo.lyingAxis === 'z') return placement.dimensions.x * 0.5;
            return placement.y;
        }

        // Chão e Grelha
        const floorBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: matDefault });
        floorBody.quaternion.setFromEuler(-Math.PI/2, 0, 0); world.addBody(floorBody);
        const grid = new THREE.GridHelper(42, 42, 0x3a3a3a, 0x111111);
        grid.position.y = -0.001;
        scene.add(grid);

        const floorVisual = new THREE.Mesh(
            new THREE.CircleGeometry(17, 72),
            new THREE.MeshStandardMaterial({
                color: 0x0d0d0d,
                roughness: 0.95,
                metalness: 0.02,
                transparent: true,
                opacity: 0.9
            })
        );
        floorVisual.rotation.x = -Math.PI / 2;
        floorVisual.receiveShadow = true;
        scene.add(floorVisual);

        // Decals are pooled because collision marks are visually useful but geometrically expensive.
        // The pool gives the stage a memory of impacts while capping GPU cost, so the oldest marks
        // disappear first instead of allowing thousands of overlapping decals to accumulate.
        function createDecalMaterial() {
            if (decalMaterial) return decalMaterial;
            decalMaterial = new THREE.MeshStandardMaterial({
                map: decalTexture || createFallbackParticleTexture(),
                color: 0xf8eedc,
                transparent: true,
                depthWrite: false,
                polygonOffset: true,
                polygonOffsetFactor: -2,
                polygonOffsetUnits: -2,
                roughness: 0.96,
                metalness: 0.0
            });
            return decalMaterial;
        }

        function disposeDecalMesh(mesh) {
            scene.remove(mesh);
            mesh.geometry.dispose();
        }

        function pushDecal(mesh) {
            decalPool.push(mesh);
            scene.add(mesh);
            while (decalPool.length > MAX_DECALS) {
                disposeDecalMesh(decalPool.shift());
            }
        }

        function configureDecalProxyMesh(body) {
            decalProxyMesh.geometry = boxGeometry;
            decalProxyMesh.material = boxMaterial;
            decalProxyMesh.position.set(body.position.x, body.position.y, body.position.z);
            decalProxyMesh.quaternion.set(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);
            decalProxyMesh.scale.copy(body.userData.scale);
            decalProxyMesh.updateMatrixWorld(true);
            return decalProxyMesh;
        }

        function getContactWorldPoint(body, contact) {
            const localPoint = contact.bi === body ? contact.ri : contact.rj;
            const worldPoint = new CANNON.Vec3();
            body.quaternion.vmult(localPoint, worldPoint);
            worldPoint.vadd(body.position, worldPoint);
            return new THREE.Vector3(worldPoint.x, worldPoint.y, worldPoint.z);
        }

        function getContactNormalForBody(body, contact) {
            const normal = new CANNON.Vec3();
            if (contact.bi === body) normal.copy(contact.ni);
            else contact.ni.scale(-1, normal);
            return new THREE.Vector3(normal.x, normal.y, normal.z).normalize();
        }

        function addDecalMark(targetMesh, position, normal, size) {
            const safeNormal = normal.clone().normalize();
            if (safeNormal.lengthSq() < 0.0001) safeNormal.set(0, 1, 0);
            const decalPosition = position.clone().addScaledVector(safeNormal, 0.02);
            const decalQuaternion = new THREE.Quaternion().setFromUnitVectors(
                new THREE.Vector3(0, 0, 1),
                safeNormal
            );
            const orientation = new THREE.Euler().setFromQuaternion(decalQuaternion);
            orientation.z += Math.random() * Math.PI * 2;
            const decalSize = new THREE.Vector3(size, size, Math.max(0.08, size * 0.35));
            const geometry = new DecalGeometry(targetMesh, decalPosition, orientation, decalSize);
            if (!geometry.attributes.position || geometry.attributes.position.count === 0) {
                geometry.dispose();
                return;
            }
            const decal = new THREE.Mesh(geometry, createDecalMaterial());
            decal.renderOrder = 2;
            pushDecal(decal);
        }

        function createFloorDecal(position, impact) {
            const radius = THREE.MathUtils.clamp(0.32 + impact * 0.08, 0.32, 0.95);
            const floorPos = new THREE.Vector3(position.x, 0.012, position.z);
            addDecalMark(floorVisual, floorPos, new THREE.Vector3(0, 1, 0), radius);
        }

        function createBoxDecal(body, contact, impact) {
            if (!boxGeometry || !body.userData?.scale) return;
            const normal = getContactNormalForBody(body, contact);
            const position = getContactWorldPoint(body, contact);
            const size = THREE.MathUtils.clamp(0.22 + impact * 0.05, 0.2, 0.55);
            addDecalMark(configureDecalProxyMesh(body), position, normal, size);
        }

        function handleBoxCollision(body, event) {
            const contact = event.contact;
            const impactRaw = Math.abs(contact.getImpactVelocityAlongNormal());
            const impactEff = effectiveImpactFromContact(contact);
            const other = contact.bi === body ? contact.bj : contact.bi;
            const now = performance.now();

            // Step 4: use impactEff (includes closing speed) for audio; keep impactRaw
            // for decals so chalk marks still mostly track sharp real impacts.
            if (impactEff >= IMPACT_AUDIO_MIN) {
                if (now - (body.userData.lastSfxAt || 0) > 68) {
                    body.userData.lastSfxAt = now;
                    if (other === floorBody) {
                        playFullCollisionAudio(body, null, impactEff);
                    } else if (other.mass > 0 && other.userData?.scale) {
                        if (body.id <= other.id) playFullCollisionAudio(body, other, impactEff);
                    }
                }
            }

            if (impactRaw < DECAL_IMPACT_THRESHOLD) return;

            if (now - (body.userData.lastDecalAt || 0) < 90) return;
            body.userData.lastDecalAt = now;

            const contactPoint = getContactWorldPoint(body, event.contact);
            triggerCollisionVisuals(impactRaw, contactPoint);

            if (other === floorBody) {
                createFloorDecal(contactPoint, impactRaw);
                return;
            }

            if (other.mass === 0) return;

            if (other.mass > 0 && body.id > other.id) return;
            createBoxDecal(body, event.contact, impactRaw);

            if (other.mass > 0 && other.userData?.scale) {
                createBoxDecal(other, event.contact, impactRaw * 0.92);
            }
        }

        function clearDecals() {
            while (decalPool.length) {
                disposeDecalMesh(decalPool.pop());
            }
        }

        function addPlacement(plan, x, z, dimensions, support = null, gapY = 0.03) {
            const y = support
                ? support.y + support.dimensions.y * 0.5 + dimensions.y * 0.5 + gapY
                : dimensions.y * 0.5;
            const placement = { x, y, z, dimensions, support };
            plan.push(placement);
            return placement;
        }

        function overlapsXZ(a, b, padding = 0.12) {
            return Math.abs(a.x - b.x) < (a.dimensions.x + b.dimensions.x) * 0.5 + padding
                && Math.abs(a.z - b.z) < (a.dimensions.z + b.dimensions.z) * 0.5 + padding;
        }

        function hasPlacementConflict(plan, candidate, padding = 0.12) {
            return plan.some((existing) => {
                const verticalGap = Math.abs(existing.y - candidate.y);
                const stackedSeparation = (existing.dimensions.y + candidate.dimensions.y) * 0.5 + 0.02;
                if (verticalGap >= stackedSeparation) return false;
                return overlapsXZ(existing, candidate, padding);
            });
        }

        function addGroundPlacement(plan, x, z, dimensions, maxAttempts = 28) {
            let candidate = { x, z, dimensions, y: dimensions.y * 0.5 };
            if (!hasPlacementConflict(plan, candidate)) {
                return addPlacement(plan, x, z, dimensions);
            }

            const startX = x;
            const startZ = z;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                const angle = attempt * 1.7;
                const radius = 0.24 * attempt;
                candidate = {
                    x: startX + Math.cos(angle) * radius,
                    z: startZ + Math.sin(angle) * radius,
                    dimensions,
                    y: dimensions.y * 0.5
                };
                if (!hasPlacementConflict(plan, candidate)) {
                    return addPlacement(plan, candidate.x, candidate.z, dimensions);
                }
            }

            return null;
        }

        function sanitizePlan(plan) {
            const stablePlan = [];
            const sorted = [...plan].sort((a, b) => a.y - b.y);

            for (const placement of sorted) {
                if (!placement.support) {
                    if (!hasPlacementConflict(stablePlan, placement, 0.12)) {
                        stablePlan.push({ ...placement });
                    }
                    continue;
                }

                const support = stablePlan.find((item) => item === placement.support || (
                    item.x === placement.support.x &&
                    item.y === placement.support.y &&
                    item.z === placement.support.z
                ));
                if (!support) continue;

                const footprintMarginX = (support.dimensions.x - placement.dimensions.x) * 0.5;
                const footprintMarginZ = (support.dimensions.z - placement.dimensions.z) * 0.5;
                if (footprintMarginX < 0.04 || footprintMarginZ < 0.04) continue;
                if (Math.abs(placement.x - support.x) > footprintMarginX * 0.75) continue;
                if (Math.abs(placement.z - support.z) > footprintMarginZ * 0.75) continue;

                const expectedY = support.y + support.dimensions.y * 0.5 + placement.dimensions.y * 0.5 + 0.02;
                const candidate = { ...placement, y: expectedY, support };
                if (!hasPlacementConflict(stablePlan, candidate, 0.06)) {
                    stablePlan.push(candidate);
                }
            }

            return stablePlan;
        }

        function createWallAggregation(plan, anchorX, anchorZ, options = {}) {
            const segments = options.segments ?? (4 + Math.floor(Math.random() * 3));
            const angle = options.angle ?? (Math.random() * Math.PI);
            const dirX = Math.cos(angle);
            const dirZ = Math.sin(angle);
            const sideX = -dirZ;
            const sideZ = dirX;
            const spacing = options.spacing ?? 0.16;
            const placements = [];
            const baseDimensions = Array.from({ length: segments }, () => randomStageDimensions(Math.random() < 0.35 ? 'pillar' : 'block'));
            const totalLength = baseDimensions.reduce((sum, dims, idx) => {
                return sum + dims.x + (idx < baseDimensions.length - 1 ? spacing : 0);
            }, 0);
            let cursor = -totalLength * 0.5;
            for (let i = 0; i < segments; i++) {
                const dimensions = baseDimensions[i];
                const offset = cursor + dimensions.x * 0.5;
                const lateral = (Math.random() - 0.5) * 0.18;
                const x = anchorX + dirX * offset + sideX * lateral;
                const z = anchorZ + dirZ * offset + sideZ * lateral;
                const placed = addGroundPlacement(plan, x, z, dimensions);
                if (!placed) {
                    cursor += dimensions.x + spacing;
                    continue;
                }
                placements.push(placed);

                if (Math.random() < 0.25) {
                    const topKind = Math.random() < 0.6 ? 'pillar' : 'block';
                    const topDimensions = randomStageDimensions(topKind);
                    topDimensions.x = Math.min(topDimensions.x, dimensions.x * 0.82);
                    topDimensions.z = Math.min(topDimensions.z, dimensions.z * 0.82);
                    addPlacement(
                        plan,
                        placed.x,
                        placed.z,
                        topDimensions,
                        placed,
                        0.025
                    );
                }

                cursor += dimensions.x + spacing;
            }
        }

        function createPlatformAggregation(plan, anchorX, anchorZ, options = {}) {
            const cols = options.cols ?? (2 + Math.floor(Math.random() * 2));
            const rows = options.rows ?? (2 + Math.floor(Math.random() * 2));
            const gap = options.gap ?? 0.06;
            const cells = [];

            let totalWidth = 0;
            for (let col = 0; col < cols; col++) {
                const colWidth = 0.9 + Math.random() * 0.28;
                cells.push(colWidth);
                totalWidth += colWidth;
                if (col < cols - 1) totalWidth += gap;
            }

            let xCursor = anchorX - totalWidth * 0.5;
            for (let col = 0; col < cols; col++) {
                const width = cells[col];
                for (let row = 0; row < rows; row++) {
                    const dimensions = randomStageDimensions('block');
                    dimensions.x = width;
                    dimensions.y *= 0.85;
                    dimensions.z = 0.82 + Math.random() * 0.22;
                    const z = anchorZ + (row - (rows - 1) * 0.5) * (dimensions.z + gap * 0.8);
                    addGroundPlacement(plan, xCursor + width * 0.5, z, dimensions);
                }
                xCursor += width + gap;
            }

            if (Math.random() < 0.35) {
                const hero = randomStageDimensions(Math.random() < 0.5 ? 'pillar' : 'block');
                const support = plan.reduce((best, item) => {
                    if (item.y > item.dimensions.y * 0.5 + 0.001) return best;
                    if (item.dimensions.x < 0.95 || item.dimensions.z < 0.85) return best;
                    const dist = Math.hypot(item.x - anchorX, item.z - anchorZ);
                    if (!best || dist < best.dist) return { item, dist };
                    return best;
                }, null)?.item;
                if (support) {
                    hero.x = Math.min(hero.x, support.dimensions.x * 0.78);
                    hero.z = Math.min(hero.z, support.dimensions.z * 0.78);
                    addPlacement(plan, support.x, support.z, hero, support, 0.025);
                }
            }
        }

        function createColumnAggregation(plan, anchorX, anchorZ, options = {}) {
            const count = options.count ?? (3 + Math.floor(Math.random() * 3));
            const radius = options.radius ?? (1.05 + Math.random() * 0.3);
            const supports = [];

            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2 + Math.random() * 0.35;
                const x = anchorX + Math.cos(angle) * radius;
                const z = anchorZ + Math.sin(angle) * radius;
                const kind = i % 2 === 0 ? 'pillar' : 'block';
                const placed = addGroundPlacement(plan, x, z, randomStageDimensions(kind));
                supports.push(placed);
            }

            const centerBase = addGroundPlacement(plan, anchorX, anchorZ, randomStageDimensions('block'));
            if (centerBase && Math.random() < 0.5) {
                const top = randomStageDimensions('pillar');
                top.x = Math.min(top.x * 0.82, centerBase.dimensions.x * 0.78);
                top.z = Math.min(top.z * 0.82, centerBase.dimensions.z * 0.78);
                addPlacement(plan, anchorX, anchorZ, top, centerBase, 0.02);
            }
        }

        async function buildStack() {
            statusMain.innerText = 'A carregar modelo 3D...';
            try {
                await loadBoxModel();
            } catch (err) {
                console.error(err);
                statusMain.innerText = 'Erro ao carregar modelo 3D.';
                throw err;
            }

            releaseAllGrips();
            disposeAllSymbolBadgeMeshes();
            bodies.forEach((body) => world.removeBody(body));
            bodies.length = 0;
            initialPos.length = 0;
            initialQuats.length = 0;
            instanceScales.length = 0;
            clearDecals();

            const plan = [];

            createWallAggregation(plan, -3.15, -1.05, { segments: 5, angle: Math.PI * 0.48 });
            createWallAggregation(plan, 3.15, -1.1, { segments: 5, angle: Math.PI * 0.52 });
            createWallAggregation(plan, -2.45, 1.45, { segments: 4, angle: Math.PI * 0.18 });
            createWallAggregation(plan, 2.55, 1.5, { segments: 4, angle: Math.PI * 0.82 });

            createPlatformAggregation(plan, 0, -2.15, { cols: 3, rows: 2, gap: 0.08 });
            createPlatformAggregation(plan, 0.2, 2.35, { cols: 2, rows: 2, gap: 0.07 });

            createColumnAggregation(plan, -3.55, 0.65, { count: 4, radius: 1.28 });
            createColumnAggregation(plan, 3.55, 0.55, { count: 4, radius: 1.28 });

            const stablePlan = sanitizePlan(plan);

            // Step 3 + Step 4 enrichment pass. For every placement we decide:
            //   - which face-pattern variant it will render with (Phase 1)
            //   - whether it tilts or lies on its side, and at what Y (Phase 2)
            //   - which audio / badge symbol tag it carries (Step 4)
            // We do this before allocating InstancedMesh objects so we can size
            // each one to the exact number of instances it will contain.
            const enriched = stablePlan.map((p) => {
                const variantIdx = pickWeightedIndex(FACE_VARIANT_WEIGHTS);
                const rotInfo = pickInitialRotation(p);
                const y = adjustYForRotation(p, rotInfo);
                const soundSymbol = pickSoundSymbol();
                return { ...p, y, variantIdx, rotInfo, soundSymbol };
            });

            const counts = new Array(FACE_VARIANTS.length).fill(0);
            for (const e of enriched) counts[e.variantIdx]++;

            createInstancedMeshesForCounts(counts);

            const cursors = new Array(FACE_VARIANTS.length).fill(0);
            for (const e of enriched) {
                const instanceIdxInVariant = cursors[e.variantIdx]++;
                createBox(e.x, e.y, e.z, e.dimensions, {
                    variantIdx: e.variantIdx,
                    instanceIdxInVariant,
                    initialQuat: e.rotInfo.quat,
                    soundSymbol: e.soundSymbol
                });
            }
        }

        // --- 3. PARTÍCULAS (SPRITES ORGÂNICOS) ---
        const particles = [];
        const particleTexture = createParticleTexture();
        for(let i=0; i<60; i++) {
            const p = new THREE.Sprite(new THREE.SpriteMaterial({
                map: particleTexture,
                color: new THREE.Color().setHSL(0.08 + Math.random() * 0.04, 0.55, 0.88),
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            }));
            p.visible = false;
            p.scale.setScalar(0.5);
            scene.add(p);
            particles.push(p);
            p.userData = { life: 0, vel: new THREE.Vector3(), spin: 0 };
        }

        // The particle texture loader accepts artist-provided PNGs but converts them into a usable
        // alpha texture at runtime. This keeps the installation flexible: image assets can be
        // sourced externally, while the code still guarantees they behave like soft chalk sprites
        // over a black background.
        function createParticleTexture() {
            const fallbackTexture = createFallbackParticleTexture();
            const loader = new THREE.TextureLoader();
            loader.load(
                CHALK_DUST_TEXTURE_URL,
                (loadedTexture) => {
                    const dustTexture = createDustTextureFromImage(loadedTexture.image);
                    decalTexture = dustTexture;
                    if (decalMaterial) {
                        decalMaterial.map = dustTexture;
                        decalMaterial.needsUpdate = true;
                    }
                    for (const particle of particles) {
                        particle.material.map = dustTexture;
                        particle.material.needsUpdate = true;
                    }
                },
                undefined,
                (err) => {
                    console.warn('Chalk dust PNG not found, using fallback dust sprite.', err);
                }
            );
            return fallbackTexture;
        }

        // This image-processing step is the current texture-processing substitute for a custom
        // surface shader: it derives transparency from luminance so non-transparent PNGs can still
        // behave like additive chalk dust. In the thesis you can describe it as a material-space
        // preprocessing stage that prepares artist assets for real-time compositing.
        function createDustTextureFromImage(image) {
            const cvs = document.createElement('canvas');
            cvs.width = image.naturalWidth || image.width;
            cvs.height = image.naturalHeight || image.height;
            const ctx = cvs.getContext('2d');
            ctx.drawImage(image, 0, 0, cvs.width, cvs.height);

            const data = ctx.getImageData(0, 0, cvs.width, cvs.height);
            for (let i = 0; i < data.data.length; i += 4) {
                const r = data.data[i];
                const g = data.data[i + 1];
                const b = data.data[i + 2];
                const luminance = (r * 0.299) + (g * 0.587) + (b * 0.114);
                const alpha = THREE.MathUtils.clamp((255 - luminance) * 1.7, 0, 255);

                data.data[i] = 255;
                data.data[i + 1] = 245;
                data.data[i + 2] = 220;
                data.data[i + 3] = alpha;
            }
            ctx.putImageData(data, 0, 0);

            const texture = new THREE.CanvasTexture(cvs);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.wrapS = THREE.ClampToEdgeWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            texture.needsUpdate = true;
            return texture;
        }

        function createFallbackParticleTexture() {
            const cvs = document.createElement('canvas');
            cvs.width = 192;
            cvs.height = 192;
            const ctx = cvs.getContext('2d');
            ctx.translate(96, 96);
            ctx.beginPath();
            for (let i = 0; i < 18; i++) {
                const angle = (i / 18) * Math.PI * 2;
                const radius = 42 + Math.sin(i * 1.7) * 10 + Math.random() * 16;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            const grad = ctx.createRadialGradient(0, 0, 8, 0, 0, 78);
            grad.addColorStop(0, 'rgba(255,255,255,0.98)');
            grad.addColorStop(0.22, 'rgba(255,244,214,0.9)');
            grad.addColorStop(0.52, 'rgba(255,196,143,0.45)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fill();
            for (let i = 0; i < 65; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 70;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random() * 0.08})`;
                ctx.beginPath();
                ctx.arc(x, y, 1 + Math.random() * 5, 0, Math.PI * 2);
                ctx.fill();
            }
            const texture = new THREE.CanvasTexture(cvs);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.needsUpdate = true;
            return texture;
        }

        function spawnExplosion(pos) {
            let count = 0;
            for(let p of particles) {
                if(!p.visible && count < 10) {
                    p.visible = true;
                    p.position.copy(pos);
                    p.position.y += 0.15;
                    p.material.opacity = 1;
                    p.scale.setScalar(0.28 + Math.random() * 0.52);
                    p.userData.life = 1.0;
                    p.userData.spin = (Math.random() - 0.5) * 0.1;
                    p.userData.vel.set((Math.random()-0.5)*0.18, Math.random()*0.18 + 0.04, (Math.random()-0.5)*0.18);
                    count++;
                }
            }
        }

        function triggerCollisionVisuals(impact, pos) {
            const energy = Math.min(impact / 6, 1.2);
            collisionPulse = Math.max(collisionPulse, energy);
            spotlightImpact = Math.max(spotlightImpact, impact);
            collisionFocus.set(pos.x, pos.y + 1, pos.z);
            rimLight.position.set(pos.x + 1.8, pos.y + 3.6, pos.z + 1.8);
            rimLight.target.position.copy(collisionFocus);
            backgroundLight.position.set(pos.x * 0.4, 4 + energy, -6 + pos.z * 0.2);
        }

        function wakeNearbyBoxes(x, y, z, radius = 3.1) {
            const radiusSq = radius * radius;
            for (const body of bodies) {
                const dx = body.position.x - x;
                const dy = body.position.y - y;
                const dz = body.position.z - z;
                if ((dx * dx) + (dy * dy) + (dz * dz) <= radiusSq) {
                    body.wakeUp();
                }
            }
        }

        // --- 4. JOGADORES (Silhuetas) ---
        const LINKS = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24]];

        function createLine(color) {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(LINKS.length * 6);
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            return new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ color: color, linewidth: 2, transparent: true, opacity: 0.8 }));
        }

        function createHandBody() {
            const body = new CANNON.Body({
                mass: 0,
                type: CANNON.Body.KINEMATIC,
                position: new CANNON.Vec3(0, -5, 0),
                shape: new CANNON.Sphere(1.18),
                material: matPlayer,
                collisionResponse: true,
                collisionFilterGroup: HAND_COLLISION_GROUP,
                collisionFilterMask: -1
            });
            body.userData = {
                lastPos: new CANNON.Vec3(0, -5, 0),
                grip: { isGrabbing: false, grabbed: null, constraint: null, recentVels: [] }
            };
            body.updateMassProperties();
            world.addBody(body);
            body.addEventListener("collide", (e) => {
                const grabbed = body.userData.grip.grabbed;
                if (grabbed && (e.contact.bi === grabbed || e.contact.bj === grabbed)) return;
                const impactRaw = Math.abs(e.contact.getImpactVelocityAlongNormal());
                const eff = effectiveImpactFromContact(e.contact);
                const obj = (e.contact.bi === body) ? e.contact.bj : e.contact.bi;
                if (eff >= IMPACT_AUDIO_MIN && obj.mass > 0) {
                    playFullCollisionAudio(obj, null, eff);
                }
                const visMag = Math.max(impactRaw, eff);
                if (visMag > 0.8 && obj.mass > 0) {
                    spawnExplosion(body.position);
                    triggerCollisionVisuals(visMag, body.position);
                }
            });
            return body;
        }

        // --- 4.b. GRAB / THROW MECHANICS ---
        // Pose lite does not actually estimate finger curl: landmarks 17-22 are
        // approximate offsets from the wrist and stay almost constant whether the
        // hand is open or closed. We therefore use HandLandmarker, which produces
        // 21 real hand keypoints, to compute a usable closure ratio.
        //   landmarks[0]  -> wrist
        //   landmarks[9]  -> middle finger MCP (palm anchor, used as hand-size ruler)
        //   landmarks[8/12/16/20] -> index/middle/ring/pinky tips
        function getFistClosureFromHand(landmarks) {
            const wrist = landmarks[0];
            const middleMcp = landmarks[9];
            if (!wrist || !middleMcp) return Infinity;
            const wmx = middleMcp.x - wrist.x;
            const wmy = middleMcp.y - wrist.y;
            const handSize = Math.sqrt(wmx * wmx + wmy * wmy) || 1e-4;
            let total = 0;
            let count = 0;
            for (const tipIdx of [8, 12, 16, 20]) {
                const tip = landmarks[tipIdx];
                if (!tip) continue;
                const dx = tip.x - wrist.x;
                const dy = tip.y - wrist.y;
                total += Math.sqrt(dx * dx + dy * dy);
                count++;
            }
            if (count === 0) return Infinity;
            return (total / count) / handSize;
        }

        // Find the closest dynamic, unheld body within reach and pin it to the
        // hand sphere with a PointToPointConstraint. The pivot on the box is
        // chosen as the world point that was closest to the hand at grab time,
        // converted into the box's local frame, so the box does not snap to a
        // weird offset and remains free to rotate naturally while held.
        function tryGrabNearestBody(handBody) {
            // Defensive: if this hand was already grabbing for any reason, drop
            // it before starting a new grip so we never stack two constraints
            // on the same hand body (would otherwise leak forever).
            if (handBody.userData.grip.isGrabbing) {
                releaseGrabbedBody(handBody);
            }
            const hp = handBody.position;
            let best = null;
            let bestDistSq = GRAB_REACH * GRAB_REACH;
            for (const b of bodies) {
                if (b.mass <= 0) continue;
                if (b.userData.heldBy) continue;
                const dx = b.position.x - hp.x;
                const dy = b.position.y - hp.y;
                const dz = b.position.z - hp.z;
                const d2 = dx*dx + dy*dy + dz*dz;
                if (d2 < bestDistSq) { best = b; bestDistSq = d2; }
            }
            if (!best) return false;

            best.wakeUp();
            best.userData.heldBy = handBody;
            best.userData._maskBeforeGrab = best.collisionFilterMask;
            best.collisionFilterMask = best.collisionFilterMask & ~HAND_COLLISION_GROUP;
            best.userData.savedDamping = { lin: best.linearDamping, ang: best.angularDamping };
            best.linearDamping = 0.6;
            best.angularDamping = 0.7;

            const worldOffset = new CANNON.Vec3(
                hp.x - best.position.x,
                hp.y - best.position.y,
                hp.z - best.position.z
            );
            const boxLocalPivot = new CANNON.Vec3();
            best.quaternion.conjugate().vmult(worldOffset, boxLocalPivot);

            const constraint = new CANNON.PointToPointConstraint(
                handBody, new CANNON.Vec3(0, 0, 0),
                best, boxLocalPivot,
                GRAB_CONSTRAINT_FORCE
            );
            world.addConstraint(constraint);

            const grip = handBody.userData.grip;
            grip.isGrabbing = true;
            grip.grabbed = best;
            grip.constraint = constraint;
            grip.recentVels.length = 0;

            spawnExplosion(handBody.position);
            return true;
        }

        function releaseGrabbedBody(handBody) {
            const grip = handBody.userData.grip;
            if (!grip || !grip.isGrabbing) return;

            if (grip.constraint) {
                try { world.removeConstraint(grip.constraint); } catch (e) {}
            }

            const body = grip.grabbed;
            if (body) {
                body.userData.heldBy = null;
                if (body.userData._maskBeforeGrab !== undefined) {
                    body.collisionFilterMask = body.userData._maskBeforeGrab;
                    body.userData._maskBeforeGrab = undefined;
                }
                if (body.userData.savedDamping) {
                    body.linearDamping = body.userData.savedDamping.lin;
                    body.angularDamping = body.userData.savedDamping.ang;
                    body.userData.savedDamping = null;
                }

                let avgX = 0, avgY = 0, avgZ = 0;
                const n = Math.max(1, grip.recentVels.length);
                for (const v of grip.recentVels) { avgX += v.x; avgY += v.y; avgZ += v.z; }
                avgX = THREE.MathUtils.clamp((avgX / n) * THROW_VELOCITY_MULT, -THROW_VELOCITY_CAP, THROW_VELOCITY_CAP);
                avgY = THREE.MathUtils.clamp((avgY / n) * THROW_VELOCITY_MULT, -THROW_VELOCITY_CAP, THROW_VELOCITY_CAP);
                avgZ = THREE.MathUtils.clamp((avgZ / n) * THROW_VELOCITY_MULT, -THROW_VELOCITY_CAP, THROW_VELOCITY_CAP);
                body.velocity.set(avgX, avgY, avgZ);
                body.angularVelocity.set(
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5
                );
                body.wakeUp();
            }

            grip.isGrabbing = false;
            grip.grabbed = null;
            grip.constraint = null;
            grip.recentVels.length = 0;
        }

        function releaseAllGrips() {
            for (const p of players) {
                for (const h of p.hands) releaseGrabbedBody(h);
            }
        }

        // Keyboard test path. Pressing G force-grabs the box closest to a hand
        // body that is currently in stage; pressing R releases everything.
        // This lets us validate the grab+constraint+throw physics path without
        // depending on MediaPipe finger detection at all.
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const k = e.key.toLowerCase();
            if (k === 'g') {
                let target = null;
                for (const p of players) {
                    for (const h of p.hands) {
                        if (h.position.y > -5 && !h.userData.grip.isGrabbing) {
                            target = h;
                            break;
                        }
                    }
                    if (target) break;
                }
                if (target) {
                    const ok = tryGrabNearestBody(target);
                    console.log("[grab] manual G grab on", target.id, "succeeded=", ok);
                } else {
                    console.log("[grab] manual G: no free hand body in stage");
                }
            } else if (k === 'r') {
                releaseAllGrips();
                console.log("[grab] manual R release all.");
            }
        });

        // Visible 3D markers for the hand body itself. Without these the user
        // cannot tell where the kinematic sphere actually is in stage space, so
        // it is impossible to know whether it is near a box at grab time.
        const handMarkers = [];
        for (let i = 0; i < 4; i++) {
            const marker = new THREE.Mesh(
                new THREE.SphereGeometry(0.24, 16, 12),
                new THREE.MeshBasicMaterial({
                    color: 0xff5577,
                    transparent: true,
                    opacity: 0.55,
                    depthWrite: false
                })
            );
            marker.visible = false;
            scene.add(marker);
            handMarkers.push(marker);
        }

        // Visible markers for HandLandmarker fingertips. Renders the 5 keypoints
        // (wrist + four extended fingertips) of every detected hand so the user
        // can confirm hand detection is actually happening in this frame.
        const HAND_DOT_BUDGET = 4 * 5;
        const handDots = [];
        for (let i = 0; i < HAND_DOT_BUDGET; i++) {
            const dot = new THREE.Mesh(
                new THREE.SphereGeometry(0.07, 10, 8),
                new THREE.MeshBasicMaterial({
                    color: 0x9affff,
                    transparent: true,
                    opacity: 0.95,
                    depthWrite: false
                })
            );
            dot.visible = false;
            scene.add(dot);
            handDots.push(dot);
        }

        const players = [
            { id: 0, name: "P1", color: 0xffaaaa, hands: [], line: null, div: document.getElementById('status-p1') },
            { id: 1, name: "P2", color: 0xaaddff, hands: [], line: null, div: document.getElementById('status-p2') }
        ];

        players.forEach(p => {
            p.hands = [createHandBody(), createHandBody()];
            p.line = createLine(p.color);
            scene.add(p.line);
        });

        // --- 5. LOGICA & RESET ---
        let lastSeen = Date.now();
        let isResetting = false;

        // Cannon's Quaternion.slerp(toQuat, t) returns a NEW quaternion and does
        // NOT mutate `this`. The pre-Step-3 code discarded the result, so resets
        // never rotated boxes back. We pass `body.quaternion` as the explicit
        // target (third arg) so the slerp writes in place. We also slerp toward
        // each box's recorded initial quaternion, which is identity for upright
        // boxes and a tilt/lying rotation for the Phase 2 ones.
        function updateReset() {
            if (!isResetting) return;
            let done = true;
            for (let i = 0; i < bodies.length; i++) {
                const body = bodies[i];
                body.velocity.set(0, 0, 0);
                body.angularVelocity.set(0, 0, 0);

                body.position.x += (initialPos[i].x - body.position.x) * 0.05;
                body.position.y += (initialPos[i].y - body.position.y) * 0.05;
                body.position.z += (initialPos[i].z - body.position.z) * 0.05;
                body.quaternion.slerp(initialQuats[i], 0.05, body.quaternion);

                if (body.position.distanceTo(initialPos[i]) > 0.05) done = false;
            }
            if (done) { isResetting = false; resetMsg.style.opacity = 0; }
        }

        // --- 6. IA / MEDIAPIPE ---
        // MediaPipe is treated as an interaction layer, not as a visual effect.
        // Detection is throttled and converted into kinematic hand bodies so the installation
        // remains responsive on standard laptops while still letting the physics engine handle
        // the actual impacts. This separation is important: AI estimates intent, physics delivers
        // believable motion.
        const video = document.getElementById("webcam");
        let landmarker;
        let handLandmarker;
        let lastDetectAt = 0;

        // AI startup is deferred until the user explicitly begins the installation because both
        // webcam access and model initialization are expensive. Loading them lazily reduces the
        // chance of a heavy first frame and keeps browser permission flow predictable in exhibition.
        async function startAI() {
            try {
                statusMain.innerText = "A carregar IA...";
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                landmarker = await PoseLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task`, delegate: "GPU" },
                    runningMode: "VIDEO", numPoses: 2
                });

                statusMain.innerText = "A carregar deteção de mãos...";
                try {
                    handLandmarker = await HandLandmarker.createFromOptions(vision, {
                        baseOptions: {
                            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
                            delegate: "GPU"
                        },
                        runningMode: "VIDEO",
                        numHands: 4,
                        minHandDetectionConfidence: HAND_DETECT_CONFIDENCE,
                        minHandPresenceConfidence: HAND_DETECT_CONFIDENCE,
                        minTrackingConfidence: HAND_DETECT_CONFIDENCE
                    });
                    console.log("[grab] HandLandmarker carregado com sucesso.");
                } catch (handErr) {
                    console.warn("[grab] HandLandmarker indisponível; o gesto de agarrar fica desativado.", handErr);
                    handLandmarker = null;
                }

                await buildStack();
                statusMain.innerText = handLandmarker
                    ? "Ligado! Entra na câmara. Fecha a mão para agarrar."
                    : "Ligado! Entra na câmara. (sem deteção de mãos)";
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.addEventListener("loadeddata", predict);
            } catch (err) {
                statusMain.innerText = "Erro: " + err.message;
            }
        }

        // MediaPipe landmarks arrive in normalized camera space. We remap them into stage space so
        // the visitor's body becomes a physical performer inside the set, rather than a UI overlay.
        function mapLandmarkToStage(lm, cfg) {
            return {
                x: (0.5 - lm.x) * cfg.scaleX,
                y: (1 - lm.y) * cfg.scaleY,
                z: THREE.MathUtils.clamp(-lm.z * cfg.zMult, -cfg.zClamp, cfg.zClamp)
            };
        }

        function mapSilhouette(lm) {
            return mapLandmarkToStage(lm, STAGE_MAP_SILHOUETTE);
        }

        function mapHand(lm) {
            return mapLandmarkToStage(lm, STAGE_MAP_HAND);
        }

        let lastTime = -1;
        // The prediction loop uses the minimum amount of AI work needed for convincing interaction.
        // By throttling inference and deriving collider velocity from landmark deltas, the code
        // transforms noisy pose data into impacts that feel intentional without running detection
        // at the full render frame rate.
        async function predict() {
            const nowMs = performance.now();
            if (landmarker && video.currentTime !== lastTime && nowMs - lastDetectAt >= DETECTION_INTERVAL_MS) {
                const previousTime = lastTime;
                lastTime = video.currentTime;
                lastDetectAt = nowMs;
                // detectForVideo is synchronous in VIDEO running-mode, so we do
                // NOT wrap the calls in extra Promise plumbing (the previous
                // version added microtask overhead and obscured errors). Each
                // call is in its own try/catch so a transient failure in one
                // detector cannot kill the prediction loop.
                let result = null;
                try { result = landmarker.detectForVideo(video, nowMs); }
                catch (err) { console.warn("[grab] pose detect error", err); }
                let handResult = null;
                if (handLandmarker) {
                    try { handResult = handLandmarker.detectForVideo(video, nowMs); }
                    catch (err) { console.warn("[grab] hand detect error", err); }
                }
                if (!result) {
                    requestAnimationFrame(predict);
                    return;
                }

                // Match every detected hand to the most plausible player hand-body
                // using all-pairs sorted assignment. Building all candidate pairs
                // first and consuming them in increasing-distance order avoids the
                // failure case where the first hand greedily steals a body that a
                // later hand was a much better match for.
                // We also reject pose wrists with low visibility so that phantom
                // landmarks for occluded hands cannot poison the assignment.
                const handLandmarksByHandBody = new Map();
                if (handResult && handResult.landmarks && handResult.landmarks.length) {
                    const pairs = [];
                    for (const hLandmarks of handResult.landmarks) {
                        const handWrist = hLandmarks[0];
                        if (!handWrist) continue;
                        for (const p of players) {
                            const poseLms = result.landmarks[p.id];
                            if (!poseLms) continue;
                            for (let i = 0; i < 2; i++) {
                                const poseWrist = poseLms[15 + i];
                                if (!poseWrist) continue;
                                const vis = poseWrist.visibility !== undefined ? poseWrist.visibility : 1;
                                if (vis < POSE_WRIST_MIN_VISIBILITY) continue;
                                const dx = handWrist.x - poseWrist.x;
                                const dy = handWrist.y - poseWrist.y;
                                const d = Math.sqrt(dx * dx + dy * dy);
                                if (d <= HAND_MATCH_DISTANCE) {
                                    pairs.push({ hLandmarks, handBody: p.hands[i], dist: d });
                                }
                            }
                        }
                    }
                    pairs.sort((a, b) => a.dist - b.dist);
                    const claimedHands = new Set();
                    for (const pair of pairs) {
                        if (claimedHands.has(pair.hLandmarks)) continue;
                        if (handLandmarksByHandBody.has(pair.handBody)) continue;
                        claimedHands.add(pair.hLandmarks);
                        handLandmarksByHandBody.set(pair.handBody, pair.hLandmarks);
                    }
                }

                let active = false;
                players.forEach((p, idx) => {
                    if(result.landmarks[idx]) {
                        active = true;
                        if(isResetting) isResetting = false;

                        const lms = result.landmarks[idx];
                        const dt = previousTime >= 0 ? Math.max(video.currentTime - previousTime, 1 / 60) : 1 / 60;
                        const wrists = [lms[15], lms[16]];
                        wrists.forEach((wrist, handIdx) => {
                            const handBody = p.hands[handIdx];
                            if (!wrist) {
                                releaseGrabbedBody(handBody);
                                handBody.velocity.set(0, 0, 0);
                                handBody.position.set(0, -10, 0);
                                handBody.aabbNeedsUpdate = true;
                                handBody.userData.lastPos.set(0, -10, 0);
                                return;
                            }

                            const hand = mapHand(wrist);
                            const lastPos = handBody.userData.lastPos;
                            handBody.velocity.set(
                                (hand.x - lastPos.x) / dt,
                                (hand.y - lastPos.y) / dt,
                                (hand.z - lastPos.z) / dt
                            );
                            handBody.position.set(hand.x, hand.y, hand.z);
                            handBody.aabbNeedsUpdate = true;
                            handBody.userData.lastPos.set(hand.x, hand.y, hand.z);
                            wakeNearbyBoxes(hand.x, hand.y, hand.z);

                            const grip = handBody.userData.grip;
                            grip.recentVels.push({
                                x: handBody.velocity.x,
                                y: handBody.velocity.y,
                                z: handBody.velocity.z
                            });
                            if (grip.recentVels.length > VELOCITY_SAMPLES) grip.recentVels.shift();

                            const matchedHand = handLandmarksByHandBody.get(handBody);
                            const grabAt = GRAB_FIST_THRESHOLD * FINGER_SENSITIVITY;
                            const releaseAt = GRAB_RELEASE_THRESHOLD * FINGER_SENSITIVITY;
                            if (matchedHand) {
                                grip.lastHandSeenAt = nowMs;
                                const closure = getFistClosureFromHand(matchedHand);
                                grip.lastClosure = closure;
                                if (!grip.isGrabbing && closure < grabAt) {
                                    tryGrabNearestBody(handBody);
                                } else if (grip.isGrabbing && closure > releaseAt) {
                                    releaseGrabbedBody(handBody);
                                }
                            } else if (grip.isGrabbing) {
                                // Hand model dropped this hand. Give a short grace
                                // window; if it stays missing, defensively release
                                // so a stuck constraint cannot hold a box forever.
                                const lastSeen = grip.lastHandSeenAt || 0;
                                if (nowMs - lastSeen > GRAB_HAND_LOST_GRACE_MS) {
                                    releaseGrabbedBody(handBody);
                                }
                            }
                        });

                        const arr = p.line.geometry.attributes.position.array;
                        let k = 0;
                        LINKS.forEach(pair => {
                            const pointA = lms[pair[0]];
                            const pointB = lms[pair[1]];
                            if (!pointA || !pointB) return;
                            const a = mapSilhouette(pointA);
                            const b = mapSilhouette(pointB);
                            arr[k++] = a.x; arr[k++] = a.y; arr[k++] = a.z;
                            arr[k++] = b.x; arr[k++] = b.y; arr[k++] = b.z;
                        });
                        while (k < arr.length) arr[k++] = 0;
                        p.line.geometry.attributes.position.needsUpdate = true;
                        p.line.visible = true;
                        const anyGrip = p.hands.some(h => h.userData.grip.isGrabbing);
                        p.div.innerText = p.name + ": " + (anyGrip ? "Agarrado" : "Conectado");
                    } else {
                        p.hands.forEach((handBody) => {
                            releaseGrabbedBody(handBody);
                            handBody.velocity.set(0, 0, 0);
                            handBody.position.set(0, -10, 0);
                            handBody.aabbNeedsUpdate = true;
                            handBody.userData.lastPos.set(0, -10, 0);
                        });
                        p.line.visible = false;
                        p.div.innerText = p.name + ": Ausente";
                    }
                });

                if(active) {
                    lastSeen = Date.now();
                    resetMsg.style.opacity = 0;
                } else if (!isResetting && Date.now() - lastSeen > 3000) {
                    isResetting = true;
                    resetMsg.style.opacity = 1;
                    releaseAllGrips();
                }

                // Render live markers for the kinematic hand spheres so the user
                // can see where the colliders actually are. A grabbing hand turns
                // red; a free hand stays pink. Hands without a pose get hidden.
                let markerIdx = 0;
                for (const p of players) {
                    for (const handBody of p.hands) {
                        const m = handMarkers[markerIdx++];
                        if (!m) break;
                        if (handBody.position.y < -5) {
                            m.visible = false;
                        } else {
                            m.visible = true;
                            m.position.set(handBody.position.x, handBody.position.y, handBody.position.z);
                            m.material.color.setHex(handBody.userData.grip.isGrabbing ? 0xff3030 : 0xff66aa);
                            m.material.opacity = handBody.userData.grip.isGrabbing ? 0.9 : 0.55;
                        }
                    }
                }

                // Render fingertip dots for every detected hand in 3D space.
                // These are drawn in the same coordinate system as the hand body
                // (mapHand) so the user sees where the model "thinks" the fingers
                // are. If no dots show up, hand detection is the failing layer.
                let dotIdx = 0;
                if (handResult && handResult.landmarks) {
                    for (const hLandmarks of handResult.landmarks) {
                        const closure = getFistClosureFromHand(hLandmarks);
                        const isFist = Number.isFinite(closure) && closure < (GRAB_FIST_THRESHOLD * FINGER_SENSITIVITY);
                        const color = isFist ? 0xff5555 : 0x9affff;
                        for (const tipIdx of [0, 8, 12, 16, 20]) {
                            if (dotIdx >= handDots.length) break;
                            const tip = hLandmarks[tipIdx];
                            const dot = handDots[dotIdx++];
                            if (!tip) { dot.visible = false; continue; }
                            const pos = mapHand(tip);
                            dot.position.set(pos.x, pos.y, pos.z);
                            dot.material.color.setHex(color);
                            dot.visible = true;
                        }
                    }
                }
                for (let i = dotIdx; i < handDots.length; i++) handDots[i].visible = false;

                // Live debug HUD. Shows what every layer of the grab pipeline is
                // actually producing, so threshold problems stop being invisible.
                const dbg = [];
                dbg.push("hand model: " + (handLandmarker ? "ON" : "OFF"));
                dbg.push("hands det:  " + (handResult && handResult.landmarks ? handResult.landmarks.length : 0));
                dbg.push("matched:    " + handLandmarksByHandBody.size);
                dbg.push("grab<" + (GRAB_FIST_THRESHOLD * FINGER_SENSITIVITY).toFixed(2) +
                        "  release>" + (GRAB_RELEASE_THRESHOLD * FINGER_SENSITIVITY).toFixed(2));
                dbg.push("keys: G=grab nearest, R=release all");
                for (const p of players) {
                    for (let hi = 0; hi < p.hands.length; hi++) {
                        const handBody = p.hands[hi];
                        const matched = handLandmarksByHandBody.get(handBody);
                        const liveClosure = matched ? getFistClosureFromHand(matched) : null;
                        const cached = handBody.userData.grip.lastClosure;
                        const showClosure = liveClosure !== null
                            ? liveClosure
                            : (typeof cached === 'number' ? cached : null);
                        const grab = handBody.userData.grip.isGrabbing ? "GRAB" : "    ";
                        const tag = liveClosure !== null ? "" : (showClosure !== null ? " (last)" : "");
                        dbg.push(p.name + ".h" + hi + " " + grab +
                                 " closure=" + (showClosure === null ? "—" : (Number.isFinite(showClosure) ? showClosure.toFixed(2) : "inf")) + tag);
                    }
                }
                statusDebug.innerText = dbg.join("\n");
            }
            requestAnimationFrame(predict);
        }

        // Loop Principal
        let lastPhysicsTime = performance.now() / 1000;
        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now() / 1000;
            const delta = Math.min(now - lastPhysicsTime, 0.05);
            lastPhysicsTime = now;
            
            if(!isResetting) world.step(1/60, delta, 4);
            else updateReset();

            collisionPulse *= 0.9;
            spotlightImpact *= 0.88;
            rimLight.intensity = 7 + spotlightImpact * 2.6 + collisionPulse * 10;
            fillLight.intensity = 4 + collisionPulse * 10;
            backgroundLight.intensity = 2.5 + collisionPulse * 7;
            renderer.toneMappingExposure = 1.05 + collisionPulse * 0.18;
            bloomPass.threshold = Math.max(0.14, BLOOM_CONFIG.threshold - collisionPulse * 0.05);
            bloomPass.radius = BLOOM_CONFIG.radius + collisionPulse * 0.08;
            bloomPass.strength = BLOOM_CONFIG.strength + collisionPulse * BLOOM_PULSE_STRENGTH;

            if (boxInstancedMeshes) {
                // Per-variant dirty bitmap. We always rewrite matrices CPU-side
                // (the cost is negligible) but only flag variants that contain
                // a body that actually moved this frame. Settled scenes therefore
                // skip the per-variant GPU buffer upload entirely.
                const dirty = boxInstancedMeshesDirtyScratch;
                for (let v = 0; v < dirty.length; v++) dirty[v] = isResetting;

                for (let i = 0; i < bodies.length; i++) {
                    const body = bodies[i];
                    const variantIdx = body.userData.variantIdx | 0;
                    const mesh = boxInstancedMeshes[variantIdx];
                    if (!mesh) continue;
                    if (body.sleepState !== CANNON.Body.SLEEPING) dirty[variantIdx] = true;

                    const instanceIdx = body.userData.instanceIdxInVariant | 0;
                    const scale = instanceScales[i];
                    instanceDummy.position.set(body.position.x, body.position.y, body.position.z);
                    instanceDummy.quaternion.set(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);
                    instanceDummy.scale.copy(scale);
                    instanceDummy.updateMatrix();
                    mesh.setMatrixAt(instanceIdx, instanceDummy.matrix);
                }
                for (let v = 0; v < boxInstancedMeshes.length; v++) {
                    const mesh = boxInstancedMeshes[v];
                    if (mesh && dirty[v]) mesh.instanceMatrix.needsUpdate = true;
                }
            }

            updateSymbolBadgeMeshes();

            for(let p of particles) {
                if(p.visible) {
                    p.position.add(p.userData.vel);
                    p.userData.vel.multiplyScalar(0.94);
                    p.userData.vel.y -= 0.0025;
                    p.userData.life -= 0.028;
                    p.material.opacity = p.userData.life * 0.72;
                    p.material.rotation += p.userData.spin;
                    p.scale.multiplyScalar(1.012);
                    if(p.userData.life <= 0) p.visible = false;
                }
            }

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, MAX_PIXEL_RATIO));
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setPixelRatio(Math.min(window.devicePixelRatio, MAX_PIXEL_RATIO));
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
